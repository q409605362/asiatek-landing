<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online convert text to unicode code points and back tool. Fast, secure, no installation.">
<meta name="keywords" content="unicode, converter, online tool, free unicode converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Unicode Converter</h1><p class="text-gray-500 mb-4">Convert text to Unicode code points and back</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="4" placeholder="Enter text..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="encode()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Text → Unicode</button><button onclick="decode()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Unicode → Text</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="4"></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function encode(){var t=document.getElementById("input").value;document.getElementById("output").value=[...t].map(function(c){var h=c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0");return"U+"+h}).join(" ")}function decode(){var t=document.getElementById("input").value;document.getElementById("output").value=t.replace(/U\+?([0-9A-Fa-f]{4,6})/g,function(m,h){return String.fromCodePoint(parseInt(h,16))})}</script>
</body>
</html>
