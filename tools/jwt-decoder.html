<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="description" content="Free online jwt decoder tool. Fast, secure, no installation.">
<meta name="keywords" content="jwt decoder, online tool, free jwt decoder">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">JWT Decoder</h1><p class="text-gray-500 mb-4">Decode JSON Web Tokens.</p>
<textarea id="token" class="w-full h-24 p-3 border rounded-lg font-mono text-sm" placeholder="eyJhbGciOi..."></textarea>
<button onclick="dec()" class="mt-3 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Decode</button>
<div class="grid grid-cols-2 gap-4 mt-4"><div><h3 class="font-semibold mb-2 text-sm">Header</h3><pre id="hdr" class="bg-gray-900 text-green-400 p-3 rounded-lg text-sm h-32 overflow-auto font-mono">\u2014</pre></div><div><h3 class="font-semibold mb-2 text-sm">Payload</h3><pre id="pay" class="bg-gray-900 text-yellow-400 p-3 rounded-lg text-sm h-32 overflow-auto font-mono">\u2014</pre></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function dec(){try{var p=document.getElementById("token").value.trim().split(".");if(p.length!==3)throw new Error("Invalid JWT");document.getElementById("hdr").textContent=JSON.stringify(JSON.parse(atob(p[0].replace(/-/g,"+").replace(/_/g,"/"))),null,2);document.getElementById("pay").textContent=JSON.stringify(JSON.parse(atob(p[1].replace(/-/g,"+").replace(/_/g,"/"))),null,2);}catch(e){document.getElementById("hdr").textContent="\u26a0\ufe0f "+e.message;}}</script>
</body>
</html>
