<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Checker - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online diff checker tool. Fast, secure, no installation.">
<meta name="keywords" content="diff checker, online tool, free diff checker">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.diff-checker">Diff Checker</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.diff-checker">Compare two texts.</p>
<div class="grid grid-cols-2 gap-4"><textarea id="a" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Original..."></textarea><textarea id="b" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Modified..."></textarea></div>
<button onclick="df()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Compare</button>
<div id="res" class="mt-4 bg-gray-50 rounded-lg p-4 font-mono text-sm whitespace-pre-wrap"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function df(){var a=document.getElementById("a").value.split("\n");var b=document.getElementById("b").value.split("\n");var h="";var mx=Math.max(a.length,b.length);for(var i=0;i<mx;i++){var x=a[i]||"";var y=b[i]||"";if(x===y)h+='<div class="text-gray-500">  '+x+"</div>";else{if(x)h+='<div class="bg-red-50 text-red-700">- '+x+"</div>";if(y)h+='<div class="bg-green-50 text-green-700">+ '+y+"</div>";}}document.getElementById("res").innerHTML=h;}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
