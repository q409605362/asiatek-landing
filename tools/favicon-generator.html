</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>

</div>
</div>
</div>

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Favicon Generator</h1><p class="text-gray-500 mb-4">Generate favicon from emoji/text.</p>
<div class="flex gap-4 items-end"><div><label class="text-sm text-gray-600">Emoji:</label><input id="txt" class="w-20 p-2 border rounded-lg ml-2 text-center text-2xl" value="\u2728" maxlength="2" oninput="gen()"></div><div><label class="text-sm text-gray-600">BG:</label><input id="bg" type="color" value="#3b82f6" class="w-10 h-10 border rounded ml-2" oninput="gen()"></div></div>
<canvas id="cv" width="32" height="32" class="border rounded mt-4"></canvas>
<div class="mt-3"><a id="dl" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm inline-block">Download PNG</a></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function gen(){var c=document.getElementById("cv");var x=c.getContext("2d");x.fillStyle=document.getElementById("bg").value;x.fillRect(0,0,32,32);x.font="24px serif";x.textAlign="center";x.textBaseline="middle";x.fillText(document.getElementById("txt").value,16,17);var l=document.getElementById("dl");l.href=c.toDataURL("image/png");l.download="favicon.png";}gen();</script>
</body>
