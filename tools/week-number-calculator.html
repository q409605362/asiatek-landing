<!DOCTYPE html>

<title>Week Number Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Find which week of the year a date falls in.">
<meta name="keywords" content="week number iso week">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Week Number Calculator</h1>
<p class="text-gray-500 mb-4">Find which week of the year a date falls in.</p>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Date</label><input type="date" id="date" class="w-full p-3 border rounded-lg"></div>
<div class="flex gap-3"><button onclick="calc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Calculate</button></div>
<div class="grid grid-cols-2 gap-4 mt-4"><div class="p-6 bg-blue-50 rounded-lg text-center"><div class="text-4xl font-bold" id="week">-</div><div class="text-sm text-gray-600">ISO Week</div></div><div class="p-6 bg-green-50 rounded-lg text-center"><div class="text-4xl font-bold" id="year">-</div><div class="text-sm text-gray-600">Year</div></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var d=new Date(document.getElementById("date").value);if(isNaN(d))return;var thursday=new Date(d);thursday.setDate(d.getDate()+4-(d.getDay()||7));var startOfYear=new Date(thursday.getFullYear(),0,1);var week=Math.ceil(((thursday-startOfYear)/86400000+1)/7);document.getElementById("week").textContent=week;document.getElementById("year").textContent=thursday.getFullYear();}document.getElementById("date").valueAsDate=new Date();calc();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
