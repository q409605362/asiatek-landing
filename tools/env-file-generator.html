<script>function gen(){var lines=document.getElementById("input").value.split("\n").filter(function(l){return l.trim()&&l.includes("=")});var out="# Environment Variables\n# Generated by Asiatek AI DevTools\n# "+new Date().toISOString().split("T")[0]+"\n\n";lines.forEach(function(l){var p=l.split("=");var k=p[0].trim();var v=p.slice(1).join("=").trim();out+k+"="+v+"\n"});document.getElementById("output").value=out}function example(){document.getElementById("input").value="# Application\nAPP_NAME=MyApp\nAPP_ENV=development\nAPP_PORT=3000\nAPP_DEBUG=true\n\n# Database\nDATABASE_URL=postgres://user:pass@localhost:5432/mydb\n\n# Redis\nREDIS_URL=redis://localhost:6379\n\n# API Keys\nOPENAI_API_KEY=sk-...\nSTRIPE_SECRET_KEY=sk_test_..."}</script>
