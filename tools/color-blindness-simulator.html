<meta http-equiv="Content-Language" content="en">

<meta name="description" content="Simulate colors for color blindness.">
<meta name="keywords" content="color blindness accessibility simulation">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Color Blindness Simulator</h1>
<p class="text-gray-500 mb-4">Simulate colors for color blindness.</p>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Select Image</label><input type="file" id="file" accept="image/*" class="w-full p-2 border rounded-lg"></div>
<div class="flex gap-2 mb-4"><button onclick="show('normal')" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Normal</button><button onclick="show('protanopia')" class="px-4 py-2 bg-gray-200 rounded-lg">Protanopia</button><button onclick="show('deuteranopia')" class="px-4 py-2 bg-gray-200 rounded-lg">Deuteranopia</button></div>
<canvas id="canvas" class="max-w-full mx-auto border rounded-lg"></canvas>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var currentMode="normal";function show(mode){currentMode=mode;processImage();}function processImage(){var file=document.getElementById("file").files[0];if(!file)return;var img=new Image();img.onload=function(){var canvas=document.getElementById("canvas");canvas.width=img.width;canvas.height=img.height;var ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);var data=ctx.getImageData(0,0,canvas.width,canvas.height);for(var i=0;i<data.data.length;i+=4){var r=data.data[i],g=data.data[i+1],b=data.data[i+2];if(currentMode==="protanopia"){data.data[i]=0.567*r+0.433*g;data.data[i+1]=0.558*r+0.442*g;data.data[i+2]=0.242*g+0.758*b;}else if(currentMode==="deuteranopia"){data.data[i]=0.625*r+0.375*g;data.data[i+1]=0.7*r+0.3*g;data.data[i+2]=0.3*g+0.7*b;}}ctx.putImageData(data,0,0);};img.src=URL.createObjectURL(file);}document.getElementById("file").onchange=processImage;</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
