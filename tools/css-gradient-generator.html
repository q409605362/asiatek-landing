<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online visual css gradient builder tool. Fast, secure, no installation.">
<meta name="keywords" content="css, gradient, generator, online tool, free css gradient generator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.css-gradient-generator">CSS Gradient Generator</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.css-gradient-generator">Visual CSS gradient builder</p>
<div class="space-y-4">
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<div><label class="text-xs font-medium text-gray-600">Color 1</label><input type="color" id="c1" value="#667eea" class="w-full h-10 border rounded cursor-pointer" oninput="update()"></div>
<div><label class="text-xs font-medium text-gray-600">Color 2</label><input type="color" id="c2" value="#764ba2" class="w-full h-10 border rounded cursor-pointer" oninput="update()"></div>
<div><label class="text-xs font-medium text-gray-600">Angle</label><input type="number" id="angle" value="135" min="0" max="360" class="w-full p-2 border rounded text-sm" oninput="update()"></div>
<div><label class="text-xs font-medium text-gray-600">Type</label><select id="type" class="w-full p-2 border rounded text-sm" onchange="update()"><option value="linear">Linear</option><option value="radial">Radial</option></select></div>
</div>
<div id="preview" class="h-40 rounded-lg border shadow-inner"></div>
<div class="bg-gray-50 p-3 rounded-lg"><code id="css" class="text-sm break-all"></code></div>
<button onclick="copy()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">Copy CSS</button>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function update(){var c1=document.getElementById("c1").value,c2=document.getElementById("c2").value,a=document.getElementById("angle").value,t=document.getElementById("type").value;var g=t==="linear"?"linear-gradient("+a+"deg, "+c1+", "+c2+")":"radial-gradient(circle, "+c1+", "+c2+")";document.getElementById("preview").style.background=g;document.getElementById("css").textContent="background: "+g+";"}function copy(){navigator.clipboard.writeText(document.getElementById("css").textContent)}update()</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
