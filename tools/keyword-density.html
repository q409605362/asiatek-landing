<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Density Checker - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online keyword density checker tool. Fast, secure, no installation.">
<meta name="keywords" content="keyword density checker, online tool, free keyword density checker">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.keyword-density">Keyword Density Checker</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.keyword-density">Analyze keyword frequency.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg text-sm" placeholder="Paste text..."></textarea>
<button onclick="an()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Analyze</button>
<div id="res" class="mt-4"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function an(){var t=document.getElementById("input").value.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(w=>w.length>2);var n=t.length;var f={};t.forEach(function(w){f[w]=(f[w]||0)+1;});var s=Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,25);var h='<div class="text-sm text-gray-500 mb-2">Total: '+n+" words</div><table class='w-full text-sm'><tr class='bg-gray-100'><th class='p-2 text-left'>Word</th><th class='p-2 text-left'>Count</th><th class='p-2 text-left'>Density</th></tr>";s.forEach(function(x){h+="<tr class='border-b'><td class='p-2'>"+x[0]+"</td><td class='p-2'>"+x[1]+"</td><td class='p-2'>"+(x[1]/n*100).toFixed(2)+"%</td></tr>";});document.getElementById("res").innerHTML=h+"</table>";}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
