<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Free online check how strong your password is tool. Fast, secure, no installation.">
<meta name="keywords" content="password, strength, checker, online tool, free password strength checker">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Password Strength Checker</h1><p class="text-gray-500 mb-4">Check how strong your password is</p>
<div class="space-y-4">
<div><label class="text-sm font-medium">Enter Password</label><input id="pw" type="text" class="w-full p-3 border rounded-lg font-mono text-sm" placeholder="Type a password to check..." oninput="check()"></div>
<div class="h-3 bg-gray-200 rounded-full overflow-hidden"><div id="bar" class="h-full rounded-full transition-all duration-300" style="width:0"></div></div>
<div id="label" class="text-lg font-bold"></div>
<div id="details" class="grid grid-cols-2 gap-2"></div>
<div id="crack" class="text-sm text-gray-500"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function check(){var p=document.getElementById("pw").value;if(!p){document.getElementById("bar").style.width="0";document.getElementById("label").textContent="";document.getElementById("details").innerHTML="";document.getElementById("crack").textContent="";return}var score=0;var checks=[{t:"8+ characters",ok:p.length>=8},{t:"12+ characters",ok:p.length>=12},{t:"Uppercase letters",ok:/[A-Z]/.test(p)},{t:"Lowercase letters",ok:/[a-z]/.test(p)},{t:"Numbers",ok:/\d/.test(p)},{t:"Special characters",ok:/[^A-Za-z0-9]/.test(p)},{t:"No common patterns",ok:!/(password|123456|qwerty|abc123)/i.test(p)}];checks.forEach(function(c){if(c.ok)score++});var pct=Math.min(100,score/checks.length*100);var colors=["#ef4444","#f97316","#eab308","#22c55e","#16a34a"];var labels=["Very Weak","Weak","Fair","Strong","Very Strong"];var idx=Math.min(4,Math.floor(score/1.5));document.getElementById("bar").style.width=pct+"%";document.getElementById("bar").style.backgroundColor=colors[idx];document.getElementById("label").textContent=labels[idx];document.getElementById("label").style.color=colors[idx];document.getElementById("details").innerHTML=checks.map(function(c){return'<div class="text-sm '+(c.ok?"text-green-600":"text-gray-400")+"">"+(c.ok?"✅":"❌")+" "+c.t+"</div>"}).join("");var pool=0;if(/[a-z]/.test(p))pool+=26;if(/[A-Z]/.test(p))pool+=26;if(/\d/.test(p))pool+=10;if(/[^A-Za-z0-9]/.test(p))pool+=33;var entropy=p.length*Math.log2(pool||1);var crackTime=Math.pow(2,entropy)/1e10;var timeStr=crackTime<1?"Instant":crackTime<60?Math.round(crackTime)+" seconds":crackTime<3600?Math.round(crackTime/60)+" minutes":crackTime<86400?Math.round(crackTime/3600)+" hours":crackTime<31536000?Math.round(crackTime/86400)+" days":Math.round(crackTime/31536000)+" years";document.getElementById("crack").textContent="⏱️ Estimated crack time (10B guesses/sec): "+timeStr+" | Entropy: "+entropy.toFixed(1)+" bits"}</script>
</body>
</html>
