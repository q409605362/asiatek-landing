<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Generate a privacy policy template.">
<meta name="keywords" content="privacy policy legal generator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Privacy Policy Generator</h1>
<p class="text-gray-500 mb-4">Generate a privacy policy template.</p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Company Name</label><input type="text" id="company" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Website URL</label><input type="url" id="url" class="w-full p-2 border rounded-lg"></div></div>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Contact Email</label><input type="email" id="email" class="w-full p-2 border rounded-lg"></div>
<div class="flex gap-3"><button onclick="generate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate</button></div>
<div id="output" class="mt-4 p-4 bg-white border rounded-lg prose max-w-none"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function generate(){var company=document.getElementById("company").value||"Company";var url=document.getElementById("url").value||"https://example.com";var email=document.getElementById("email").value||"privacy@example.com";document.getElementById("output").innerHTML='<h2>Privacy Policy for '+company+'</h2><p>Last updated: '+new Date().toLocaleDateString()+'</p><h3>1. Information We Collect</h3><p>We collect information you provide directly to us.</p><h3>2. How We Use Your Information</h3><p>We use the information we collect to provide and improve our services.</p><h3>3. Information Sharing</h3><p>We do not sell your personal information to third parties.</p><h3>4. Contact Us</h3><p>Contact us at: <a href="mailto:'+email+'">'+email+'</a></p>';}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
