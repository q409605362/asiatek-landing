<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Sorter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online line sorter tool. Fast, secure, no installation.">
<meta name="keywords" content="line sorter, online tool, free line sorter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.line-sorter">Line Sorter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.line-sorter">Sort lines alphabetically, numerically, or randomly.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Enter lines..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="sort('az')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">A\u2192Z</button><button onclick="sort('za')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Z\u2192A</button><button onclick="sort('num')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Numeric</button><button onclick="sort('rnd')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Shuffle</button></div>
<textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function sort(t){var l=document.getElementById("input").value.split("\n");if(t==="az")l.sort();else if(t==="za")l.sort().reverse();else if(t==="num")l.sort((a,b)=>parseFloat(a)-parseFloat(b));else{for(var i=l.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[l[i],l[j]]=[l[j],l[i]];}}document.getElementById("output").value=l.join("\n");}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
