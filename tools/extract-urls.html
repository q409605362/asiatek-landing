<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extract URLs - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online extract urls and links from text tool. Fast, secure, no installation.">
<meta name="keywords" content="extract, urls, online tool, free extract urls">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Extract URLs</h1><p class="text-gray-500 mb-4">Extract URLs and links from text</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder="Paste text containing URLs..."></textarea>
<div class="mt-3"><button onclick="run()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Extract URLs</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="6"></textarea>
<div id="count" class="text-sm text-gray-500 mt-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function run(){var t=document.getElementById("input").value;var urls=t.match(/https?:\/\/[^\s<>"{}|\\^`\[\]]+/g)||[];var unique=[...new Set(urls)];document.getElementById("output").value=unique.join("\n");document.getElementById("count").textContent=unique.length+" unique URL(s) found"}</script>
</body>
</html>
