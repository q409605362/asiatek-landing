<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find & Replace - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online find & replace tool. Fast, secure, no installation.">
<meta name="keywords" content="find & replace, online tool, free find & replace">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Find & Replace</h1><p class="text-gray-500 mb-4">Find and replace text.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Paste text..."></textarea>
<div class="grid grid-cols-2 gap-3 mt-3"><div><input id="find" class="w-full p-2 border rounded-lg text-sm" placeholder="Find..."></div><div><input id="repl" class="w-full p-2 border rounded-lg text-sm" placeholder="Replace with..."></div></div>
<button onclick="rep()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Replace All</button>
<span id="cnt" class="ml-3 text-sm text-gray-500"></span>
<textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function rep(){var t=document.getElementById("input").value;var f=document.getElementById("find").value;var r=document.getElementById("repl").value;var esc=f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");var re=new RegExp(esc,"gi");var m=t.match(re);document.getElementById("cnt").textContent=m?m.length+" replacements":"0 matches";document.getElementById("output").value=t.replace(re,r);}</script>
</body>
</html>
