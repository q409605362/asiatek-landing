<script>function d2o(){var v=document.getElementById("dec").value;if(v==="")return;document.getElementById("oct").value=parseInt(v).toString(8)}function o2d(){var v=document.getElementById("oct").value;if(v==="")return;document.getElementById("dec").value=parseInt(v,8)}</script>
