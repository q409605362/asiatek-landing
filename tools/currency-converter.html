<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Convert between 20+ world currencies with live exchange rates">
<meta name="keywords" content="currency converter, exchange rate, forex, USD, EUR, GBP, live rates">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Currency Converter</h1><p class="text-gray-500 mb-4">Convert between 20+ world currencies with live exchange rates</p>
<div class="max-w-2xl mx-auto">
<div class="grid grid-cols-2 gap-4 mb-4">
<div><label class="text-sm font-medium">Amount</label><input id="amount" type="number" class="w-full p-2 border rounded-lg text-sm" value="100" oninput="convert()"></div>
<div><label class="text-sm font-medium">From</label><select id="from" class="w-full p-2 border rounded-lg text-sm" onchange="convert()"></select></div>
<div class="col-span-2 flex justify-center"><button onclick="swap()" class="bg-gray-100 hover:bg-gray-200 px-4 py-1 rounded-full text-sm">⇅ Swap</button></div>
<div><label class="text-sm font-medium">To</label><select id="to" class="w-full p-2 border rounded-lg text-sm" onchange="convert()"></select></div>
</div>
<div id="result" class="bg-blue-50 p-6 rounded-lg text-center">
<div class="text-3xl font-bold text-blue-700" id="converted">—</div>
<div class="text-sm text-gray-500 mt-1" id="rate-info">Loading rates...</div>
</div>
<div id="popular" class="mt-6"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var rates={};var currencies={USD:"US Dollar",EUR:"Euro",GBP:"British Pound",JPY:"Japanese Yen",CNY:"Chinese Yuan",KRW:"South Korean Won",INR:"Indian Rupee",AUD:"Australian Dollar",CAD:"Canadian Dollar",CHF:"Swiss Franc",SGD:"Singapore Dollar",HKD:"Hong Kong Dollar",THB:"Thai Baht",MYR:"Malaysian Ringgit",IDR:"Indonesian Rupiah",PHP:"Philippine Peso",VND:"Vietnamese Dong",BRL:"Brazilian Real",MXN:"Mexican Peso",RUB:"Russian Ruble"};
function init(){var fs=document.getElementById("from"),ts=document.getElementById("to");
for(var c in currencies){fs.innerHTML+="<option value='"+c+"'>"+c+" - "+currencies[c]+"</option>";ts.innerHTML+="<option value='"+c+"'>"+c+" - "+currencies[c]+"</option>"}
fs.value="USD";ts.value="EUR";
fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json()).then(d=>{rates=d.rates;convert()}).catch(()=>{rates={EUR:0.92,GBP:0.79,JPY:149,CNY:7.24,KRW:1350,INR:83.5,AUD:1.53,CAD:1.36,CHF:0.88,SGD:1.34,HKD:7.82,THB:35.5,MYR:4.72,IDR:15800,PHP:56.2,VND:24500,BRL:4.97,MXN:17.1,RUB:92.5,USD:1};convert()})}
function swap(){var f=document.getElementById("from"),t=document.getElementById("to");var tmp=f.value;f.value=t.value;t.value=tmp;convert()}
function convert(){var amt=parseFloat(document.getElementById("amount").value)||0;var f=document.getElementById("from").value,t=document.getElementById("to").value;
if(!rates[f]||!rates[t]){document.getElementById("converted").textContent="Rate unavailable";return}
var usd=amt/rates[f];var result=usd*rates[t];var rate=rates[t]/rates[f];
document.getElementById("converted").textContent=result.toFixed(2)+" "+t;
document.getElementById("rate-info").textContent="1 "+f+" = "+rate.toFixed(4)+" "+t+" · 1 "+t+" = "+(1/rate).toFixed(4)+" "+f;
var pop=["EUR","GBP","JPY","CNY","KRW"];var html="<h3 class='font-medium mb-2 text-sm'>Popular Conversions from "+f+"</h3><div class='grid grid-cols-2 gap-2'>";
pop.forEach(function(c){if(c===f)return;var v=amt/rates[f]*rates[c];html+="<div class='bg-gray-50 p-2 rounded text-sm'><span class='text-gray-500'>"+amt+" "+f+" =</span> <b>"+v.toFixed(2)+" "+c+"</b></div>"});
document.getElementById("popular").innerHTML=html+"</div>"}init()</script>
</body>
</html>
