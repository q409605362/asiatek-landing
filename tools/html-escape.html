<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">HTML Escape/Unescape</h1>
<p class="text-gray-500 mb-4">Escape or unescape HTML special characters.</p>
<div class="flex gap-2 mb-3"><button id="eb" onclick="sm('e')" class="px-4 py-2 rounded-lg text-sm bg-orange-600 text-white">Escape</button><button id="db" onclick="sm('d')" class="px-4 py-2 rounded-lg text-sm bg-gray-200">Unescape</button></div><textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Enter HTML..."></textarea><div class="flex gap-3 mt-3"><button onclick="proc()" class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700" id="pb">Escape</button></div><textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var m="e";function sm(x){m=x;document.getElementById("eb").className=x==="e"?"px-4 py-2 rounded-lg text-sm bg-orange-600 text-white":"px-4 py-2 rounded-lg text-sm bg-gray-200";document.getElementById("db").className=x==="d"?"px-4 py-2 rounded-lg text-sm bg-orange-600 text-white":"px-4 py-2 rounded-lg text-sm bg-gray-200";document.getElementById("pb").textContent=x==="e"?"Escape":"Unescape";}function esc(s){return s.replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",""":"&quot;","'":"&#39;"}[c];});}function unesc(s){return s.replace(/&(amp|lt|gt|quot|#39);/g,function(m){return{"&amp;":"&","&lt;":"<","&gt;":">","&quot;":""","&#39;":"'"}[m];});}function proc(){document.getElementById("output").value=m==="e"?esc(document.getElementById("input").value):unesc(document.getElementById("input").value);}</script>
