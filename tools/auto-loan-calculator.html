<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Loan Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Calculate car loan payments including sales tax, trade-in value and depreciation">
<meta name="keywords" content="auto loan calculator, car payment, vehicle loan, car finance">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.auto-loan-calculator">Auto Loan Calculator</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.auto-loan-calculator">Calculate car loan payments including sales tax, trade-in value and depreciation</p>
<div class="grid md:grid-cols-2 gap-6">
<div class="space-y-3">
<div><label class="text-sm font-medium">Vehicle Price ($)</label><input id="price" type="number" class="w-full p-2 border rounded-lg text-sm" value="35000" oninput="calc()"></div>
<div><label class="text-sm font-medium">Down Payment ($)</label><input id="down" type="number" class="w-full p-2 border rounded-lg text-sm" value="5000" oninput="calc()"></div>
<div><label class="text-sm font-medium">Trade-in Value ($)</label><input id="trade" type="number" class="w-full p-2 border rounded-lg text-sm" value="0" oninput="calc()"></div>
<div><label class="text-sm font-medium">Sales Tax (%)</label><input id="tax" type="number" class="w-full p-2 border rounded-lg text-sm" value="7" step="0.1" oninput="calc()"></div>
<div><label class="text-sm font-medium">Interest Rate (%)</label><input id="rate" type="number" class="w-full p-2 border rounded-lg text-sm" value="6.5" step="0.1" oninput="calc()"></div>
<div><label class="text-sm font-medium">Loan Term (months)</label><select id="term" class="w-full p-2 border rounded-lg text-sm" onchange="calc()"><option value="24">24 months</option><option value="36">36 months</option><option value="48">48 months</option><option value="60" selected>60 months</option><option value="72">72 months</option><option value="84">84 months</option></select></div>
</div>
<div>
<div id="result" class="bg-blue-50 p-4 rounded-lg space-y-3"></div>
<div id="depreciation" class="mt-4 bg-gray-50 p-4 rounded-lg"></div>
</div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function fmt(n){return "$"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function calc(){
var price=parseFloat(document.getElementById("price").value)||0;
var down=parseFloat(document.getElementById("down").value)||0;
var trade=parseFloat(document.getElementById("trade").value)||0;
var taxRate=parseFloat(document.getElementById("tax").value)/100;
var rate=parseFloat(document.getElementById("rate").value)/100/12;
var n=parseInt(document.getElementById("term").value);
var tax=(price)*taxRate;var loan=price-down-trade+tax;
if(loan<=0){document.getElementById("result").innerHTML="<p class='text-red-500'>Invalid inputs</p>";return}
var m,interest,total;
if(rate===0){m=loan/n;interest=0;total=loan}
else{m=loan*rate*Math.pow(1+rate,n)/(Math.pow(1+rate,n)-1);total=m*n;interest=total-loan}
document.getElementById("result").innerHTML=
"<div class='text-3xl font-bold text-blue-700'>"+fmt(m)+"<span class='text-sm font-normal text-gray-500'>/mo</span></div>"+
"<div class='grid grid-cols-2 gap-2 mt-3 text-sm'>"+
"<div class='bg-white p-2 rounded'><span class='text-gray-500'>Sales Tax</span><br><b>"+fmt(tax)+"</b></div>"+
"<div class='bg-white p-2 rounded'><span class='text-gray-500'>Loan Amount</span><br><b>"+fmt(loan)+"</b></div>"+
"<div class='bg-white p-2 rounded'><span class='text-gray-500'>Total Interest</span><br><b class='text-red-600'>"+fmt(interest)+"</b></div>"+
"<div class='bg-white p-2 rounded'><span class='text-gray-500'>Total Cost</span><br><b>"+fmt(total+down+trade)+"</b></div></div>";
var val=price;var dep=[val];
for(var i=1;i<=Math.min(n,84);i++){val*=(i===1?0.8:0.983);dep.push(val)}
var maxH=120;
var bars=dep.filter(function(v,i){return i%6===0||i===dep.length-1}).map(function(v,i){var h=Math.max(2,v/maxH*120);return "<div style='height:"+h+"px' class='flex-1 bg-orange-400 hover:bg-orange-600 rounded-t' title='"+fmt(v)+"'></div>"}).join("");
document.getElementById("depreciation").innerHTML="<h3 class='font-medium mb-2 text-sm'>Estimated Depreciation</h3><div class='flex items-end gap-1' style='height:"+maxH+"px'>"+bars+"</div><div class='text-xs text-gray-400 mt-1'>Car value over loan term</div>"}calc()</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
