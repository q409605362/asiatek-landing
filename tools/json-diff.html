<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Diff Tool - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Compare two JSON objects.">
<meta name="keywords" content="json diff compare">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">JSON Diff Tool</h1>
<p class="text-gray-500 mb-4">Compare two JSON objects.</p>
<div class="grid grid-cols-2 gap-4"><div><h3 class="font-bold mb-2">JSON 1</h3><textarea id="json1" class="w-full h-48 p-3 border rounded-lg font-mono text-sm">{"a":1,"b":"hello"}</textarea></div><div><h3 class="font-bold mb-2">JSON 2</h3><textarea id="json2" class="w-full h-48 p-3 border rounded-lg font-mono text-sm">{"a":1,"b":"world","c":3}</textarea></div></div><div class="flex gap-3 mt-3"><button onclick="diff()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Compare</button></div><div class="mt-3"><h3 class="font-bold mb-2">Differences</h3><div id="result" class="p-4 bg-gray-50 border rounded-lg font-mono text-sm whitespace-pre-wrap"></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function diff(){try{var o1=JSON.parse(document.getElementById("json1").value);var o2=JSON.parse(document.getElementById("json2").value);var diffs=[];function cmp(a,b,path){if(typeof a!==typeof b){diffs.push({path,p1:a,p2:b});return;}if(Array.isArray(a)&&Array.isArray(b)){if(JSON.stringify(a)!==JSON.stringify(b))diffs.push({path,p1:a,p2:b});}else if(typeof a==="object"&&a){var keys=new Set([...Object.keys(a),...Object.keys(b)]);keys.forEach(k=>cmp(a[k],b[k],(path?path+".":"")+k));}else if(a!==b)diffs.push({path,p1:a,p2:b});}cmp(o1,o2,"");document.getElementById("result").textContent=diffs.length?diffs.map(d=>`${d.path}: ${JSON.stringify(d.p1)} -> ${JSON.stringify(d.p2)}`).join("\n"):"No differences";}catch(e){document.getElementById("result").textContent="Error";}}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
