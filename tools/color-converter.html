<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online color converter tool. Fast, secure, no installation.">
<meta name="keywords" content="color converter, online tool, free color converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.color-converter">Color Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.color-converter">Convert between HEX, RGB, HSL.</p>
<div class="flex gap-4 items-end"><input type="color" id="pk" value="#3b82f6" class="w-16 h-10 border rounded cursor-pointer" oninput="cv(this.value)"><input id="hex" class="w-32 p-2 border rounded-lg font-mono" placeholder="#3b82f6" oninput="cv(this.value)"></div>
<div id="pv" class="w-full h-20 rounded-lg mt-4 border" style="background:#3b82f6"></div>
<div id="vals" class="mt-4 space-y-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function cv(h){if(!h.startsWith("#"))h="#"+h;document.getElementById("pv").style.background=h;var r=parseInt(h.substr(1,2),16);var g=parseInt(h.substr(3,2),16);var b=parseInt(h.substr(5,2),16);var r1=r/255,g1=g/255,b1=b/255;var mx=Math.max(r1,g1,b1),mn=Math.min(r1,g1,b1);var hue,sat,l=(mx+mn)/2;if(mx===mn){hue=sat=0;}else{var d=mx-mn;sat=l>0.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r1:hue=(g1-b1)/d+(g1<b1?6:0);break;case g1:hue=(b1-r1)/d+2;break;case b1:hue=(r1-g1)/d+4;break;}hue/=6;}document.getElementById("vals").innerHTML='<div class="bg-gray-50 p-3 rounded"><b>HEX:</b> <code>'+h.toUpperCase()+'</code></div><div class="bg-gray-50 p-3 rounded"><b>RGB:</b> <code>rgb('+r+", "+g+", "+b+')</code></div><div class="bg-gray-50 p-3 rounded"><b>HSL:</b> <code>hsl('+Math.round(hue*360)+", "+Math.round(sat*100)+"%, "+Math.round(l*100)+"%)</code></div>';}cv("#3b82f6");</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
