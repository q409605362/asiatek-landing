<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Agent Parser - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online parse and analyze user agent strings tool. Fast, secure, no installation.">
<meta name="keywords" content="user, agent, parser, online tool, free user agent parser">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.user-agent-parser">User Agent Parser</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.user-agent-parser">Parse and analyze user agent strings</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="3" placeholder="Paste a user agent string..." oninput="parse()"></textarea>
<div class="mt-3"><button onclick="useMine()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Use My User Agent</button></div>
<div id="result" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function useMine(){document.getElementById("input").value=navigator.userAgent;parse()}function parse(){var ua=document.getElementById("input").value;if(!ua){document.getElementById("result").innerHTML="";return}var browser="Unknown",os="Unknown",device="Desktop";if(/Edg\//.test(ua))browser="Microsoft Edge";else if(/OPR\//.test(ua))browser="Opera";else if(/Chrome\//.test(ua))browser="Chrome";else if(/Safari\//.test(ua)&&!/Chrome/.test(ua))browser="Safari";else if(/Firefox\//.test(ua))browser="Firefox";if(/Windows/.test(ua))os="Windows";else if(/Mac OS X/.test(ua))os="macOS";else if(/Linux/.test(ua))os="Linux";else if(/Android/.test(ua))os="Android";else if(/iOS|iPhone|iPad/.test(ua))os="iOS";if(/Mobile/.test(ua))device="Mobile";else if(/Tablet|iPad/.test(ua))device="Tablet";else if(/Bot|Crawler|Spider/.test(ua))device="Bot";document.getElementById("result").innerHTML=[["Browser",browser],["OS",os],["Device",device],["Full UA",ua]].map(function(x){return'<div class="bg-white p-3 rounded-lg border"><div class="text-xs text-gray-500">'+x[0]+'</div><div class="font-medium text-sm mt-1 break-all">'+x[1]+'</div></div>'}).join("")}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
