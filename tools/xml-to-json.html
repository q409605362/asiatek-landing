<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.xml-to-json">XML to JSON Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.xml-to-json">Convert XML to JSON format</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder='<root><item><name>John</name><age>30</age></item></root>'></textarea>
<div class="mt-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert to JSON</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="6"></textarea>
</main>

<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">

</div>
</footer>
<script>function xmlToObj(node){var obj={};if(node.attributes){for(var i=0;i<node.attributes.length;i++){var a=node.attributes[i];obj["@"+a.name]=a.value}}if(node.childNodes.length===1&&node.childNodes[0].nodeType===3){return node.childNodes[0].nodeValue}for(var i=0;i<node.childNodes.length;i++){var child=node.childNodes[i];if(child.nodeType!==1)continue;var name=child.nodeName;var val=xmlToObj(child);if(obj[name]){if(!Array.isArray(obj[name]))obj[name]=[obj[name]];obj[name].push(val)}else{obj[name]=val}}return Object.keys(obj).length?obj:""}function convert(){try{var xml=document.getElementById("input").value;var parser=new DOMParser();var doc=parser.parseFromString(xml,"text/xml");var err=doc.querySelector("parsererror");if(err)throw new Error("Invalid XML: "+err.textContent);var result=xmlToObj(doc.documentElement);document.getElementById("output").value=JSON.stringify(result,null,2)}catch(e){document.getElementById("output").value="Error: "+e.message}}</script>
