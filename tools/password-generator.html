<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online password generator tool. Fast, secure, no installation.">
<meta name="keywords" content="password generator, online tool, free password generator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.password-generator">Password Generator</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.password-generator">Generate strong passwords.</p>
<div class="flex gap-3 items-end"><div><label class="text-sm text-gray-600">Length:</label><input id="len" type="number" value="16" class="w-20 p-2 border rounded-lg ml-2"></div><div><label class="text-sm text-gray-600">Count:</label><input id="cnt" type="number" value="5" class="w-20 p-2 border rounded-lg ml-2"></div><button onclick="gen()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Generate</button></div>
<div class="flex gap-4 mt-3"><label class="text-sm"><input type="checkbox" id="u" checked> Upper</label><label class="text-sm"><input type="checkbox" id="l" checked> Lower</label><label class="text-sm"><input type="checkbox" id="n" checked> Numbers</label><label class="text-sm"><input type="checkbox" id="s" checked> Symbols</label></div>
<div id="out" class="mt-4 space-y-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function gen(){var len=parseInt(document.getElementById("len").value);var cnt=parseInt(document.getElementById("cnt").value);var c="";if(document.getElementById("u").checked)c+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";if(document.getElementById("l").checked)c+="abcdefghijklmnopqrstuvwxyz";if(document.getElementById("n").checked)c+="0123456789";if(document.getElementById("s").checked)c+="!@#$%^&*_+-=";if(!c)c="abcdefghijklmnopqrstuvwxyz";var h="";for(var i=0;i<cnt;i++){var p="";var a=new Uint32Array(len);crypto.getRandomValues(a);for(var j=0;j<len;j++)p+=c[a[j]%c.length];h+='<div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg"><code class="font-mono text-sm">'+p+'</code><button onclick="navigator.clipboard.writeText(''+p.replace(/'/g,"\\'")+'')" class="text-blue-600 text-sm">Copy</button></div>';}document.getElementById("out").innerHTML=h;}gen();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
