<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online convert between volume units tool. Fast, secure, no installation.">
<meta name="keywords" content="volume, converter, online tool, free volume converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Volume Converter</h1><p class="text-gray-500 mb-4">Convert between volume units</p>
<div class="space-y-3">
<div class="flex items-center gap-3"><input id="val" type="number" class="flex-1 p-2 border rounded-lg text-sm" value="1" oninput="convert()"><select id="unit" class="p-2 border rounded-lg text-sm" onchange="convert()"><option value="1">Liters</option><option value="0.264172">US Gallons</option><option value="0.219969">Imp. Gallons</option><option value="33.814">Fluid Ounces</option><option value="0.001">Cubic Meters</option><option value="61.0237">Cubic Inches</option></select></div>
<div id="results" class="grid grid-cols-2 gap-2"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var units=["Liters","US Gallons","Imp. Gallons","Fluid Ounces","Cubic Meters","Cubic Inches"];var factors=[1,0.264172,0.219969,33.814,0.001,61.0237];function convert(){var v=parseFloat(document.getElementById("val").value)||0;var f=parseFloat(document.getElementById("unit").value);var l=v/f;document.getElementById("results").innerHTML=units.map(function(n,i){return'<div class="bg-white p-3 rounded-lg border"><div class="text-xs text-gray-500">'+n+'</div><div class="font-mono text-sm font-medium mt-1">'+(l*factors[i]).toLocaleString(undefined,{maximumFractionDigits:6})+'</div></div>'}).join("")}convert()</script>
</body>
</html>
