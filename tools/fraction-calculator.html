<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Add, subtract, multiply, divide fractions.">
<meta name="keywords" content="fraction calculator math">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Fraction Calculator</h1>
<p class="text-gray-500 mb-4">Add, subtract, multiply, divide fractions.</p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Number 1</label><div class="flex gap-2"><input type="number" id="n1" value="1" class="w-full p-2 border rounded-lg"><span class="p-2">/</span><input type="number" id="d1" value="2" class="w-full p-2 border rounded-lg"></div></div><div><label class="block text-sm text-gray-600 mb-1">Number 2</label><div class="flex gap-2"><input type="number" id="n2" value="1" class="w-full p-2 border rounded-lg"><span class="p-2">/</span><input type="number" id="d2" value="4" class="w-full p-2 border rounded-lg"></div></div></div>
<div class="flex gap-2 mb-4"><button onclick="calc('+')" class="px-4 py-2 bg-blue-600 text-white rounded-lg">+</button><button onclick="calc('-')" class="px-4 py-2 bg-blue-600 text-white rounded-lg">-</button><button onclick="calc('*')" class="px-4 py-2 bg-blue-600 text-white rounded-lg">×</button><button onclick="calc('/')" class="px-4 py-2 bg-blue-600 text-white rounded-lg">÷</button></div>
<div class="p-6 bg-blue-50 rounded-lg text-center"><div class="text-3xl font-bold" id="result">3/4</div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function gcd(a,b){return b?gcd(b,a%b):a;}function calc(op){var n1=parseInt(document.getElementById("n1").value)||0;var d1=parseInt(document.getElementById("d1").value)||1;var n2=parseInt(document.getElementById("n2").value)||0;var d2=parseInt(document.getElementById("d2").value)||1;var nr,dr;if(op==="+"){nr=n1*d2+n2*d1;dr=d1*d2;}else if(op==="-"){nr=n1*d2-n2*d1;dr=d1*d2;}else if(op==="*"){nr=n1*n2;dr=d1*d2;}else{nr=n1*d2;dr=d1*n2;}var g=gcd(Math.abs(nr),Math.abs(dr));nr/=g;dr/=g;if(dr<0){nr=-nr;dr=-dr;}document.getElementById("result").textContent=nr+"/"+dr;}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
