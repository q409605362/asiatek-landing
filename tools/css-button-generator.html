<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">CSS Button Generator</h1>
<p class="text-gray-500 mb-4">Generate CSS buttons with live preview.</p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Background</label><input type="color" id="bg" value="#3b82f6" class="w-full h-10 cursor-pointer"></div><div><label class="block text-sm text-gray-600 mb-1">Text Color</label><input type="color" id="color" value="#ffffff" class="w-full h-10 cursor-pointer"></div></div><div class="grid grid-cols-3 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Padding</label><input type="number" id="padding" value="12" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Radius</label><input type="number" id="radius" value="8" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Font Size</label><input type="number" id="fontsize" value="16" class="w-full p-2 border rounded-lg"></div></div><div class="text-center p-8 bg-gray-100 rounded-lg mb-4"><button id="preview" style="background:#3b82f6;color:#ffffff;padding:12px 24px;border-radius:8px;font-size:16px;border:none;cursor:pointer;">Click Me</button></div><div class="flex gap-3"><button onclick="copy()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Copy CSS</button></div><pre id="css" class="mt-4 p-4 bg-gray-800 text-green-400 rounded-lg text-sm"></pre>
</main>

<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">

<script>function update(){var bg=document.getElementById("bg").value;var color=document.getElementById("color").value;var pad=document.getElementById("padding").value;var rad=document.getElementById("radius").value;var fs=document.getElementById("fontsize").value;var btn=document.getElementById("preview");btn.style.background=bg;btn.style.color=color;btn.style.padding=pad+"px 24px";btn.style.borderRadius=rad+"px";btn.style.fontSize=fs+"px";document.getElementById("css").textContent=".btn {\n  background: "+bg+";\n  color: "+color+";\n  padding: "+pad+"px 24px;\n  border-radius: "+rad+"px;\n  font-size: "+fs+"px;\n  border: none;\n}";}function copy(){navigator.clipboard.writeText(document.getElementById("css").textContent);}update();</script>
