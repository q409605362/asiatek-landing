<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.chmod-calculator">Chmod Calculator</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.chmod-calculator">Unix file permission calculator</p>
<div class="space-y-4">
<div class="grid grid-cols-4 gap-2 bg-gray-50 p-3 rounded-lg text-sm font-medium"><div></div><div class="text-center">Read</div><div class="text-center">Write</div><div class="text-center">Execute</div></div>
<div class="grid grid-cols-4 gap-2 items-center"><div class="font-medium">Owner</div><input type="checkbox" id="or" class="justify-self-center" onchange="calc()" checked><input type="checkbox" id="ow" class="justify-self-center" onchange="calc()" checked><input type="checkbox" id="ox" class="justify-self-center" onchange="calc()"></div>
<div class="grid grid-cols-4 gap-2 items-center"><div class="font-medium">Group</div><input type="checkbox" id="gr" class="justify-self-center" onchange="calc()" checked><input type="checkbox" id="gw" class="justify-self-center" onchange="calc()"><input type="checkbox" id="gx" class="justify-self-center" onchange="calc()"></div>
<div class="grid grid-cols-4 gap-2 items-center"><div class="font-medium">Others</div><input type="checkbox" id="tr" class="justify-self-center" onchange="calc()" checked><input type="checkbox" id="tw" class="justify-self-center" onchange="calc()"><input type="checkbox" id="tx" class="justify-self-center" onchange="calc()"></div>
<div class="bg-blue-50 p-4 rounded-lg text-center"><div class="text-4xl font-mono font-bold text-blue-700" id="octal">744</div><div class="text-sm text-gray-500 mt-1" id="sym">rwxr--r--</div></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){function v(r,w,x){return(r?4:0)+(w?2:0)+(x?1:0)}var o=v(document.getElementById("or").checked,document.getElementById("ow").checked,document.getElementById("ox").checked);var g=v(document.getElementById("gr").checked,document.getElementById("gw").checked,document.getElementById("gx").checked);var t=v(document.getElementById("tr").checked,document.getElementById("tw").checked,document.getElementById("tx").checked);document.getElementById("octal").textContent=""+o+g+t;function s(n){return(n&4?"r":"-")+(n&2?"w":"-")+(n&1?"x":"-")}document.getElementById("sym").textContent=s(o)+s(g)+s(t)}calc()</script>
