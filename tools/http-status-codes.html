<script>var C=[[100,"Continue","Server received headers."],[200,"OK","Success."],[201,"Created","Resource created."],[204,"No Content","Success, no content."],[301,"Moved Permanently","Resource moved."],[302,"Found","Temporary redirect."],[304,"Not Modified","Not modified."],[400,"Bad Request","Invalid request."],[401,"Unauthorized","Auth required."],[403,"Forbidden","Access denied."],[404,"Not Found","Resource not found."],[405,"Method Not Allowed","Method not supported."],[408,"Request Timeout","Timeout."],[429,"Too Many Requests","Rate limited."],[500,"Internal Server Error","Server error."],[502,"Bad Gateway","Invalid upstream response."],[503,"Service Unavailable","Service down."],[504,"Gateway Timeout","Upstream timeout."]];function rndr(f){var h="";C.forEach(function(c){if(f&&!((c[0]+"").includes(f)||c[1].toLowerCase().includes(f.toLowerCase())))return;var cl=c[0]<300?"bg-green-100":c[0]<400?"bg-blue-100":c[0]<500?"bg-red-100":"bg-orange-100";h+='<div class="flex gap-4 p-3 rounded-lg '+cl+'"><span class="font-mono font-bold w-12">'+c[0]+'</span><div><b>'+c[1]+'</b><div class="text-sm text-gray-600">'+c[2]+"</div></div></div>";});document.getElementById("codes").innerHTML=h;}function flt(){rndr(document.getElementById("srch").value);}rndr();</script>
