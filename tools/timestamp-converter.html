<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online timestamp converter tool. Fast, secure, no installation.">
<meta name="keywords" content="timestamp converter, online tool, free timestamp converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.timestamp-converter">Unix Timestamp Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.timestamp-converter">Convert timestamps to dates.</p>
<div class="grid grid-cols-2 gap-4"><div><label class="text-sm text-gray-600">Timestamp:</label><input id="ts" class="w-full p-2 border rounded-lg font-mono mt-1" placeholder="1719820800"><button onclick="ts2d()" class="mt-2 px-3 py-1 bg-orange-600 text-white rounded-lg text-sm hover:bg-orange-700">Convert</button><button onclick="now()" class="mt-2 ml-2 px-3 py-1 bg-gray-200 rounded-lg text-sm">Now</button><pre id="dr" class="mt-2 bg-gray-50 p-3 rounded-lg text-xs font-mono whitespace-pre-wrap"></pre></div><div><label class="text-sm text-gray-600">Date:</label><input id="dt" type="datetime-local" class="w-full p-2 border rounded-lg mt-1"><button onclick="d2ts()" class="mt-2 px-3 py-1 bg-orange-600 text-white rounded-lg text-sm hover:bg-orange-700">Convert</button><pre id="tr" class="mt-2 bg-gray-50 p-3 rounded-lg text-xs font-mono whitespace-pre-wrap"></pre></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function ts2d(){var t=parseInt(document.getElementById("ts").value);if(t<1e12)t*=1000;var d=new Date(t);document.getElementById("dr").textContent="UTC: "+d.toUTCString()+"\nISO: "+d.toISOString()+"\nLocal: "+d.toString();}function d2ts(){var d=new Date(document.getElementById("dt").value);document.getElementById("tr").textContent="Seconds: "+Math.floor(d.getTime()/1000)+"\nMilliseconds: "+d.getTime();}function now(){document.getElementById("ts").value=Math.floor(Date.now()/1000);ts2d();}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
