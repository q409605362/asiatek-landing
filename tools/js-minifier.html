<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Minifier - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online basic javascript minification tool. Fast, secure, no installation.">
<meta name="keywords" content="js, minifier, online tool, free js minifier">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.js-minifier">JS Minifier</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.js-minifier">Basic JavaScript minification</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="8" placeholder="Paste your JavaScript here..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="run()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Minify JS</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="8"></textarea>
<div id="info" class="text-sm text-gray-500 mt-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function run(){var c=document.getElementById("input").value;var orig=c.length;c=c.replace(/\/\/.*$/gm,"").replace(/\/\*[\s\S]*?\*\//g,"").replace(/\n\s*\n/g,"\n").split("\n").map(function(l){return l.trimEnd()}).join("\n").replace(/^\s+/gm,"");document.getElementById("output").value=c;document.getElementById("info").textContent="Original: "+orig+" chars → Minified: "+c.length+" chars ("+Math.round((1-c.length/orig)*100)+"% smaller)"}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
