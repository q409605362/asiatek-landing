<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to XML Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Convert JSON to XML format.">
<meta name="keywords" content="json to xml">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">JSON to XML Converter</h1>
<p class="text-gray-500 mb-4">Convert JSON to XML format.</p>
<textarea id="input" class="w-full h-48 p-3 border rounded-lg font-mono text-sm">{"user":{"name":"John"}}</textarea><div class="flex gap-3 mt-3"><button onclick="proc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert</button></div><textarea id="output" class="w-full h-48 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function j2x(obj,name){if(typeof obj!=="object")return"<"+name+">"+String(obj)+"</"+name+">";var xml="";if(Array.isArray(obj)){obj.forEach(i=>xml+=j2x(i,name.replace(/s$/,"")||"item"));}else{for(var k in obj)xml+=j2x(obj[k],k);}return xml;}function proc(){try{var obj=JSON.parse(document.getElementById("input").value);document.getElementById("output").value='<?xml version="1.0" encoding="UTF-8"?>\n'+j2x(obj,"root");}catch(e){document.getElementById("output").value="Error";}}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
