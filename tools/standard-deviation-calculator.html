<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Deviation Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Calculate standard deviation of a dataset.">
<meta name="keywords" content="standard deviation statistics">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Standard Deviation Calculator</h1>
<p class="text-gray-500 mb-4">Calculate standard deviation of a dataset.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Enter numbers separated by commas...">2,4,4,4,5,5,7,9</textarea>
<div class="flex gap-3 mt-3"><button onclick="calc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Calculate</button></div>
<div class="grid grid-cols-2 gap-4 mt-4"><div class="p-4 bg-blue-50 rounded-lg text-center"><div class="text-3xl font-bold" id="mean">-</div><div class="text-sm text-gray-600">Mean</div></div><div class="p-4 bg-green-50 rounded-lg text-center"><div class="text-3xl font-bold" id="stddev">-</div><div class="text-sm text-gray-600">Std Dev</div></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var nums=document.getElementById("input").value.split(",").map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));if(nums.length===0)return;var mean=nums.reduce((a,b)=>a+b,0)/nums.length;var variance=nums.reduce((a,b)=>a+Math.pow(b-mean,2),0)/nums.length;document.getElementById("mean").textContent=mean.toFixed(4);document.getElementById("stddev").textContent=Math.sqrt(variance).toFixed(4);}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
