<script>var mime={".txt":"text/plain",".html":"text/html",".css":"text/css",".js":"application/javascript",".json":"application/json",".xml":"application/xml",".pdf":"application/pdf",".zip":"application/zip",".gz":"application/gzip",".tar":"application/x-tar",".png":"image/png",".jpg":"image/jpeg",".jpeg":"image/jpeg",".gif":"image/gif",".svg":"image/svg+xml",".webp":"image/webp",".ico":"image/x-icon",".mp3":"audio/mpeg",".wav":"audio/wav",".ogg":"audio/ogg",".mp4":"video/mp4",".webm":"video/webm",".avi":"video/x-msvideo",".woff":"font/woff",".woff2":"font/woff2",".ttf":"font/ttf",".otf":"font/otf",".doc":"application/msword",".docx":"application/vnd.openxmlformats-officedocument.wordprocessingml.document",".xls":"application/vnd.ms-excel",".xlsx":"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",".ppt":"application/vnd.ms-powerpoint",".pptx":"application/vnd.openxmlformats-officedocument.presentationml.presentation",".csv":"text/csv",".md":"text/markdown",".yaml":"application/x-yaml",".yml":"application/x-yaml",".wasm":"application/wasm",".bmp":"image/bmp",".tiff":"image/tiff",".mpg":"video/mpeg",".mpeg":"video/mpeg",".7z":"application/x-7z-compressed",".rar":"application/vnd.rar",".sql":"application/sql",".rtf":"application/rtf",".swf":"application/x-shockwave-flash"};function lookup(){var v=document.getElementById("ext").value.toLowerCase().trim();if(!v.startsWith("."))v="."+v;var matches=Object.entries(mime).filter(function(e){return e[0].includes(v)||v.includes(e[0])});if(mime[v]){document.getElementById("result").innerHTML='<div class="bg-blue-50 p-4 rounded-lg"><span class="font-mono text-lg text-blue-700">'+mime[v]+'</span><span class="text-gray-500 ml-2">('+v+')</span></div>'}else if(matches.length){document.getElementById("result").innerHTML=matches.map(function(m){return'<div class="bg-gray-50 p-3 rounded-lg"><span class="font-mono text-blue-600">'+m[1]+'</span> <span class="text-gray-400">('+m[0]+')</span></div>'}).join("")}else{document.getElementById("result").innerHTML='<div class="text-gray-400">No results found</div>'}}</script>
