<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Roll virtual dice.">
<meta name="keywords" content="dice dice roller random">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Dice Roller</h1>
<p class="text-gray-500 mb-4">Roll virtual dice.</p>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Number of Dice</label><input type="number" id="count" value="2" min="1" max="10" class="w-full p-3 border rounded-lg"></div>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Sides per Die</label><select id="sides" class="w-full p-2 border rounded-lg"><option value="6">D6</option><option value="4">D4</option><option value="20">D20</option></select></div>
<div class="flex gap-3"><button onclick="roll()" class="px-6 py-3 bg-blue-600 text-white text-xl rounded-lg hover:bg-blue-700">🎲 Roll</button></div>
<div id="dice" class="flex flex-wrap gap-4 mt-6 justify-center"></div>
<div class="mt-4 text-center"><span class="text-4xl font-bold" id="total">0</span><div class="text-gray-600">Total</div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function roll(){var count=parseInt(document.getElementById("count").value)||1;var sides=parseInt(document.getElementById("sides").value)||6;var results=[];for(var i=0;i<count;i++)results.push(Math.floor(Math.random()*sides)+1);var total=results.reduce((a,b)=>a+b,0);document.getElementById("dice").innerHTML=results.map(r=>'<div class="w-20 h-20 bg-white border-4 border-blue-300 rounded-xl flex items-center justify-center text-4xl font-bold shadow-lg">'+r+'</div>').join("");document.getElementById("total").textContent=total;}roll();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
