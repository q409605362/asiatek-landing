<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Base64 - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online convert images to base64 encoded strings tool. Fast, secure, no installation.">
<meta name="keywords" content="image, to, base64, online tool, free image to base64">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.image-to-base64">Image to Base64</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.image-to-base64">Convert images to Base64 encoded strings</p>
<div class="space-y-4">
<div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center" id="drop">
<input type="file" id="file" accept="image/*" class="hidden" onchange="handleFile()">
<label for="file" class="cursor-pointer text-blue-600 hover:text-blue-800 font-medium">Click to select an image</label>
<p class="text-sm text-gray-500 mt-2">or drag and drop here</p>
</div>
<div id="preview" class="hidden text-center"><img id="img" class="max-h-48 mx-auto rounded-lg border"></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-xs mt-3" rows="6" readonly></textarea>
<div id="info" class="text-sm text-gray-500"></div>
<button onclick="copy()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">Copy Base64</button>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var drop=document.getElementById("drop");drop.ondragover=function(e){e.preventDefault();drop.classList.add("border-blue-400")};drop.ondragleave=function(){drop.classList.remove("border-blue-400")};drop.ondrop=function(e){e.preventDefault();drop.classList.remove("border-blue-400");if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0])};function handleFile(){if(document.getElementById("file").files[0])processFile(document.getElementById("file").files[0])}function processFile(f){var reader=new FileReader();reader.onload=function(e){var b64=e.target.result;document.getElementById("output").value=b64;document.getElementById("img").src=b64;document.getElementById("preview").classList.remove("hidden");var kb=(f.size/1024).toFixed(1);document.getElementById("info").textContent="File: "+f.name+" ("+kb+" KB) | Base64 length: "+b64.length.toLocaleString()}reader.readAsDataURL(f)}function copy(){navigator.clipboard.writeText(document.getElementById("output").value)}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
