<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online url encoder/decoder tool. Fast, secure, no installation.">
<meta name="keywords" content="url encoder/decoder, online tool, free url encoder/decoder">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">URL Encoder/Decoder</h1><p class="text-gray-500 mb-4">Encode or decode URLs.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Enter URL..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="en()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Encode</button><button onclick="de()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Decode</button><button onclick="enc()" class="px-4 py-2 bg-gray-200 rounded-lg">Encode Component</button></div>
<textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function en(){document.getElementById("output").value=encodeURI(document.getElementById("input").value);}function de(){document.getElementById("output").value=decodeURI(document.getElementById("input").value);}function enc(){document.getElementById("output").value=encodeURIComponent(document.getElementById("input").value);}</script>
</body>
</html>
