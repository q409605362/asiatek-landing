<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.markdown-to-html">Markdown to HTML Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.markdown-to-html">Convert Markdown to HTML</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder="# Hello\nThis is **bold** and *italic*"></textarea>
<div class="mt-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert to HTML</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="6"></textarea>
<div class="mt-3"><h3 class="text-sm font-medium text-gray-500 mb-2">Preview:</h3><div id="preview" class="p-4 border rounded-lg bg-white prose prose-sm max-w-none"></div></div>

<script>function convert(){var m=document.getElementById("input").value;var h=m.replace(/^######\s+(.*)$/gm,"<h6>$1</h6>").replace(/^#####\s+(.*)$/gm,"<h5>$1</h5>").replace(/^####\s+(.*)$/gm,"<h4>$1</h4>").replace(/^###\s+(.*)$/gm,"<h3>$1</h3>").replace(/^##\s+(.*)$/gm,"<h2>$1</h2>").replace(/^#\s+(.*)$/gm,"<h1>$1</h1>").replace(/```(\w*)\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>').replace(/^[-*]\s+(.*)$/gm,"<li>$1</li>").replace(/(<li>.*<\/li>)/s,"<ul>$1</ul>").replace(/^>\s+(.*)$/gm,"<blockquote>$1</blockquote>").replace(/^---$/gm,"<hr>").replace(/\n\n/g,"</p><p>").replace(/^(?!<[hupol])/gm,function(m){return m});h="<p>"+h+"</p>";document.getElementById("output").value=h;document.getElementById("preview").innerHTML=h}</script>

window.changeLanguage = function(lang) {
