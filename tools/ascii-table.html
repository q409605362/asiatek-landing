<script>var h="";for(var i=0;i<128;i++){var c=(i>31&&i<127)?String.fromCharCode(i):"";h+="<tr><td class=\"p-2 border\">"+i+"</td><td class=\"p-2 border\">"+i.toString(16).toUpperCase().padStart(2,"0")+"</td><td class=\"p-2 border font-mono text-lg\">"+c+"</td></tr>";}document.getElementById("tb").innerHTML=h;</script>
