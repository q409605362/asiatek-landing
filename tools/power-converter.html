<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Convert between power units.">
<meta name="keywords" content="power converter watt horsepower">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Power Converter</h1>
<p class="text-gray-500 mb-4">Convert between power units.</p>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Value</label><input type="number" id="val" value="1" class="w-full p-3 border rounded-lg text-xl"></div>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">From</label><select id="from" class="w-full p-2 border rounded-lg"><option value="w">Watt</option><option value="kw">kWatt</option><option value="hp">Horsepower</option><option value="btu">BTU/h</option></select></div><div><label class="block text-sm text-gray-600 mb-1">To</label><select id="to" class="w-full p-2 border rounded-lg"><option value="hp">Horsepower</option><option value="w">Watt</option><option value="kw">kWatt</option><option value="btu">BTU/h</option></select></div></div>
<div class="flex gap-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert</button></div>
<div class="mt-4 p-6 bg-blue-50 rounded-lg text-center"><div class="text-4xl font-bold" id="result">0.001341 hp</div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var toW={w:1,kw:1000,hp:745.7,btu:0.293071};function convert(){var v=parseFloat(document.getElementById("val").value)||0;var f=document.getElementById("from").value;var t=document.getElementById("to").value;var r=v*toW[f]/toW[t];document.getElementById("result").textContent=r.toFixed(6)+" "+t;}convert();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
