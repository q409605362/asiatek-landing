}' oninput="convert()"></textarea><div class="mt-1"><button onclick="sample()" class="text-xs text-blue-600 hover:underline">Load Sample</button></div><div id="error" class="text-red-500 text-xs mt-1"></div></div>

<script>function getType(v){if(v===null)return "null";if(Array.isArray(v)){if(v.length===0)return "any[]";var t=getType(v[0]);return v.every(e=>getType(e)===t)?t+"[]":"any[]"}switch(typeof v){case "string":return "string";case "number":return Number.isInteger(v)?"number":"number";case "boolean":return "boolean";case "object":return null;default:return "any"}}
function convert(){try{document.getElementById("error").textContent="";var json=JSON.parse(document.getElementById("input").value);if(!json||typeof json!=="object"){document.getElementById("output").value="// Input must be a JSON object";return}
var optional=document.getElementById("optional").checked;var readonly=document.getElementById("readonly").checked;var interfaces=[];var prefix="R"+Math.random().toString(36).substr(2,4);
function process(obj,name){var lines=[];for(var k in obj){if(!obj.hasOwnProperty(k))continue;var v=obj[k];var opt=optional?"?":"";var ro=readonly?"readonly ":"";var t=getType(v);if(t===null){var ref=name+k.charAt(0).toUpperCase()+k.slice(1);process(v,ref);t=ref}lines.push("  "+ro+k+opt+": "+t+";")}interfaces.unshift("export interface "+name+" {\n"+lines.join("\n")+"\n}")}
process(json,"Root");document.getElementById("output").value=interfaces.join("\n\n")}catch(e){document.getElementById("error").textContent="Invalid JSON: "+e.message}}
function copy(){navigator.clipboard.writeText(document.getElementById("output").value).then(()=>{var b=event.target;b.textContent="Copied!";setTimeout(()=>b.textContent="Copy Output",1500)})}
function sample(){document.getElementById("input").value=JSON.stringify({name:"John Doe",age:30,isActive:true,tags:["admin","user"],address:{street:"123 Main St",city:"New York",zip:"10001"},orders:[{id:1,total:99.99,date:"2024-01-01"}]},null,2);convert()}
document.getElementById("input").value='{"name":"John","age":30,"tags":["admin","user"],"address":{"city":"NYC"}}';convert()</script>
