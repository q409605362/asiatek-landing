<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML Formatter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online xml formatter tool. Fast, secure, no installation.">
<meta name="keywords" content="xml formatter, online tool, free xml formatter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.xml-formatter">XML Formatter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.xml-formatter">Format and beautify XML.</p>
<textarea id="input" class="w-full h-40 p-3 border rounded-lg font-mono text-sm" placeholder="<root><item>value</item></root>"></textarea>
<button onclick="fmt()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Format</button>
<textarea id="output" class="w-full h-40 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function fmt(){try{var x=document.getElementById("input").value;var p=new DOMParser();var d=p.parseFromString(x,"text/xml");if(d.querySelector("parsererror")){document.getElementById("output").value="Invalid XML";return;}var r="",s=[];x.replace(/>\s+</g,"><").split(/(<[^>]+>)/).forEach(function(t){if(t.match(/^<\//)){r+="\n";s.pop();r+="  ".repeat(s.length)+t;}else if(t.match(/^</)){r+="\n"+"  ".repeat(s.length)+t;if(!t.match(/\/>$/))s.push(t);}else if(t.trim())r+="\n"+"  ".repeat(s.length)+t.trim();});document.getElementById("output").value=r.trim();}catch(e){document.getElementById("output").value="Error: "+e.message;}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
