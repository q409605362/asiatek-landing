<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online regex tester tool. Fast, secure, no installation.">
<meta name="keywords" content="regex tester, online tool, free regex tester">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Regex Tester</h1><p class="text-gray-500 mb-4">Test regular expressions.</p>
<div class="flex gap-3"><div class="flex-1"><input id="pat" class="w-full p-2 border rounded-lg font-mono text-sm" placeholder="Pattern..."></div><input id="flg" class="w-16 p-2 border rounded-lg font-mono text-sm" value="g"></div>
<textarea id="test" class="w-full h-28 p-3 border rounded-lg font-mono text-sm mt-3" placeholder="Test string..."></textarea>
<button onclick="tst()" class="mt-3 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Test</button>
<div id="res" class="mt-4"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function tst(){try{var p=document.getElementById("pat").value;var f=document.getElementById("flg").value;var t=document.getElementById("test").value;var r=new RegExp(p,f);var m=[];var x;while((x=r.exec(t))!==null){m.push({full:x[0],index:x.index,groups:x.slice(1)});if(!x[0])r.lastIndex++;}var h="<h3 class='font-semibold text-sm mb-2'>Matches: "+m.length+"</h3>";m.forEach(function(x,i){h+='<div class="bg-gray-50 p-2 rounded mb-1 text-sm"><span class="text-gray-400">#'+(i+1)+"</span> <code class='bg-yellow-100 px-1 rounded'>"+x.full+"</code> <span class='text-gray-500'>at "+x.index+"</span></div>";});document.getElementById("res").innerHTML=h;}catch(e){document.getElementById("res").innerHTML='<div class="text-red-600 text-sm">\u26a0\ufe0f '+e.message+"</div>";}}</script>
</body>
</html>
