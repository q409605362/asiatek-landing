<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">HTML to Markdown Converter</h1><p class="text-gray-500 mb-4">Convert HTML to Markdown format</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder="<h1>Hello</h1><p>This is <strong>bold</strong> and <em>italic</em></p>"></textarea>
<div class="mt-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert to Markdown</button></div>

<script>function convert(){var h=document.getElementById("input").value;h=h.replace(/<h1[^>]*>(.*?)<\/h1>/gi,"# $1\n\n").replace(/<h2[^>]*>(.*?)<\/h2>/gi,"## $1\n\n").replace(/<h3[^>]*>(.*?)<\/h3>/gi,"### $1\n\n").replace(/<h4[^>]*>(.*?)<\/h4>/gi,"#### $1\n\n").replace(/<h5[^>]*>(.*?)<\/h5>/gi,"##### $1\n\n").replace(/<h6[^>]*>(.*?)<\/h6>/gi,"###### $1\n\n").replace(/<strong[^>]*>(.*?)<\/strong>/gi,"**$1**").replace(/<b[^>]*>(.*?)<\/b>/gi,"**$1**").replace(/<em[^>]*>(.*?)<\/em>/gi,"*$1*").replace(/<i[^>]*>(.*?)<\/i>/gi,"*$1*").replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi,"[$2]($1)").replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*\/?>/gi,"![$2]($1)").replace(/<br\s*\/?>/gi,"\n").replace(/<p[^>]*>(.*?)<\/p>/gi,"$1\n\n").replace(/<li[^>]*>(.*?)<\/li>/gi,"- $1\n").replace(/<code[^>]*>(.*?)<\/code>/gi,"`$1`").replace(/<pre[^>]*>(.*?)<\/pre>/gis,"```\n$1\n```\n").replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi,function(m,c){return c.split("\n").map(function(l){return"> "+l}).join("\n")+"\n\n"}).replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/\n{3,}/g,"\n\n");document.getElementById("output").value=h.trim()}</script>
