<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Free online set and run countdown timers tool. Fast, secure, no installation.">
<meta name="keywords" content="countdown, timer, online tool, free countdown timer">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Countdown Timer</h1><p class="text-gray-500 mb-4">Set and run countdown timers</p>
<div class="text-center space-y-6">
<div class="text-6xl font-mono font-bold text-gray-800" id="display">00:00:00</div>
<div class="flex justify-center gap-3" id="inputs">
<div><label class="text-xs text-gray-500">Hours</label><input id="h" type="number" class="w-20 p-2 border rounded-lg text-center text-lg" value="0" min="0"></div>
<div><label class="text-xs text-gray-500">Minutes</label><input id="m" type="number" class="w-20 p-2 border rounded-lg text-center text-lg" value="5" min="0"></div>
<div><label class="text-xs text-gray-500">Seconds</label><input id="s" type="number" class="w-20 p-2 border rounded-lg text-center text-lg" value="0" min="0"></div>
</div>
<div class="flex justify-center gap-3">
<button onclick="start()" id="startBtn" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-lg">Start</button>
<button onclick="pause()" class="px-6 py-3 bg-gray-200 rounded-lg hover:bg-gray-300 text-lg">Pause</button>
<button onclick="reset()" class="px-6 py-3 bg-gray-200 rounded-lg hover:bg-gray-300 text-lg">Reset</button>
</div>
<div class="flex justify-center gap-2 flex-wrap"><button onclick="preset(1,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">1 min</button><button onclick="preset(5,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">5 min</button><button onclick="preset(10,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">10 min</button><button onclick="preset(15,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">15 min</button><button onclick="preset(25,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">25 min</button><button onclick="preset(60,0)" class="px-3 py-1 bg-gray-100 rounded text-sm hover:bg-gray-200">1 hour</button></div>
<div id="msg" class="text-lg font-medium"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var timer=null,timeLeft=0,running=false;function fmt(s){var h=Math.floor(s/3600);var m=Math.floor(s%3600/60);var sc=s%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0")}function tick(){if(timeLeft>0){timeLeft--;document.getElementById("display").textContent=fmt(timeLeft);update()}else{running=false;clearInterval(timer);document.getElementById("display").textContent="00:00:00";document.getElementById("msg").textContent="⏰ Time's up!";document.getElementById("msg").className="text-lg font-medium text-red-600";try{new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgipGBcGBTVHyMcJ2...").play()}catch(e){}}}function start(){if(running)return;var h=parseInt(document.getElementById("h").value)||0;var m=parseInt(document.getElementById("m").value)||0;var s=parseInt(document.getElementById("s").value)||0;if(timeLeft===0)timeLeft=h*3600+m*60+s;if(timeLeft<=0)return;running=true;document.getElementById("msg").textContent="";timer=setInterval(tick,1000)}function pause(){running=false;clearInterval(timer)}function reset(){pause();timeLeft=0;document.getElementById("display").textContent="00:00:00";document.getElementById("msg").textContent=""}function preset(m,s){document.getElementById("h").value=0;document.getElementById("m").value=m;document.getElementById("s").value=s;reset()}function update(){var total=(parseInt(document.getElementById("h").value)||0)*3600+(parseInt(document.getElementById("m").value)||0)*60+(parseInt(document.getElementById("s").value)||0);if(!running&&total>0&&timeLeft===0)document.getElementById("display").textContent=fmt(total)}</script>
</body>
</html>
