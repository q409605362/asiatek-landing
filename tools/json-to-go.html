<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.json-to-go">JSON to Go Struct Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.json-to-go">Convert JSON to Go structs with json tags instantly</p>
<div class="grid md:grid-cols-2 gap-4">
<div><label class="text-sm font-medium mb-1 block">JSON Input</label><textarea id="input" class="w-full h-64 p-3 border rounded-lg text-sm font-mono" oninput="convert()"></textarea><div class="mt-1"><button onclick="sample()" class="text-xs text-blue-600 hover:underline">Load Sample</button><label class="ml-3 text-xs"><input type="checkbox" id="jsonTags" checked onchange="convert()"> Include JSON tags</label></div><div id="error" class="text-red-500 text-xs mt-1"></div></div>
<div><label class="text-sm font-medium mb-1 block">Go Struct</label><textarea id="output" class="w-full h-64 p-3 border rounded-lg text-sm font-mono bg-gray-50" readonly></textarea><div class="mt-1"><button onclick="copy()" class="text-xs text-blue-600 hover:underline">Copy Output</button></div></div>
</div>

</div>

<script>function goType(v){if(v===null)return "interface{}";if(Array.isArray(v)){if(v.length===0)return "[]interface{}";return "[]"+goType(v[0])}switch(typeof v){case "string":return "string";case "number":return Number.isInteger(v)?"int64":"float64";case "boolean":return "bool";case "object":return null;default:return "interface{}"}}
function goName(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/[_-](\w)/g,(_,c)=>c.toUpperCase())}
function convert(){try{document.getElementById("error").textContent="";var json=JSON.parse(document.getElementById("input").value);if(!json||typeof json!=="object")return;
var tags=document.getElementById("jsonTags").checked;var structs=[];
function process(obj,name){var fields=[];var subs=[];for(var k in obj){if(!obj.hasOwnProperty(k))continue;var v=obj[k];var t=goType(v);var fn=goName(k);if(t===null){var ref=goName(k);process(v,ref);t=ref}var tag=tags?' `json:"'+k+',omitempty"`':"";fields.push("    "+fn+" "+t+tag)}
structs.unshift("type "+name+" struct {\n"+fields.join("\n")+"\n}")}
process(json,"Root");document.getElementById("output").value="package main\n\n"+structs.join("\n\n")}catch(e){document.getElementById("error").textContent="Invalid JSON: "+e.message}}
function copy(){navigator.clipboard.writeText(document.getElementById("output").value).then(()=>{var b=event.target;b.textContent="Copied!";setTimeout(()=>b.textContent="Copy Output",1500)})}
function sample(){document.getElementById("input").value=JSON.stringify({name:"John",age:30,tags:["admin","user"],address:{city:"NYC"}},null,2);convert()}
document.getElementById("input").value='{"name":"John","age":30,"tags":["admin","user"],"address":{"city":"NYC"}}';convert()</script>
