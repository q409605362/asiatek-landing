</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Dockerfile Generator</h1><p class="text-gray-500 mb-4">Generate Dockerfile templates for your project</p>
<div class="space-y-3">
<div><label class="text-sm font-medium">Language/Runtime</label><select id="lang" class="w-full p-2 border rounded-lg text-sm"><option value="node">Node.js</option><option value="python">Python</option><option value="go">Go</option><option value="java">Java</option><option value="ruby">Ruby</option><option value="rust">Rust</option><option value="php">PHP</option></select></div>
<div><label class="text-sm font-medium">Version</label><input id="ver" class="w-full p-2 border rounded-lg text-sm" value="20"></div>
<div><label class="text-sm font-medium">Port</label><input id="port" class="w-full p-2 border rounded-lg text-sm" value="3000"></div>
<div><label class="text-sm font-medium">Command</label><input id="cmd" class="w-full p-2 border rounded-lg text-sm" value="npm start"></div>
<button onclick="gen()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate Dockerfile</button>
<textarea id="output" class="w-full h-60 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>

<script>var templates={node:function(v){return"FROM node:"+v+"-alpine\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci --only=production\nCOPY . .\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},python:function(v){return"FROM python:"+v+"-slim\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\nCOPY . .\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},go:function(v){return"FROM golang:"+v+"-alpine AS builder\nWORKDIR /app\nCOPY go.* ./\nRUN go mod download\nCOPY . .\nRUN CGO_ENABLED=0 go build -o main .\n\nFROM alpine:latest\nWORKDIR /app\nCOPY --from=builder /app/main .\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},java:function(v){return"FROM eclipse-temurin:"+v+"-jdk-alpine AS builder\nWORKDIR /app\nCOPY . .\nRUN ./gradlew build --no-daemon\n\nFROM eclipse-temurin:"+v+"-jre-alpine\nWORKDIR /app\nCOPY --from=builder /app/build/libs/*.jar app.jar\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},ruby:function(v){return"FROM ruby:"+v+"-slim\nWORKDIR /app\nCOPY Gemfile* ./\nRUN bundle install\nCOPY . .\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},rust:function(v){return"FROM rust:"+v+"-alpine AS builder\nWORKDIR /app\nCOPY . .\nRUN cargo build --release\n\nFROM alpine:latest\nCOPY --from=builder /app/target/release/app /usr/local/bin/\nEXPOSE "+document.getElementById("port").value+"\nCMD ["+document.getElementById("cmd").value.split(" ").map(function(x){return'"'+x+'"'}).join(", ")+"]"},php:function(v){return"FROM php:"+v+"-apache\nWORKDIR /var/www/html\nCOPY . .\nRUN docker-php-ext-install pdo pdo_mysql\nEXPOSE "+document.getElementById("port").value}};function gen(){var l=document.getElementById("lang").value;var v=document.getElementById("ver").value;document.getElementById("output").value="# Dockerfile generated by Asiatek AI DevTools\n\n"+templates[l](v)}</script>
</body>
