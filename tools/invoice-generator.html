<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Generate simple invoices.">
<meta name="keywords" content="invoice bill receipt">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Invoice Generator</h1>
<p class="text-gray-500 mb-4">Generate simple invoices.</p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">From</label><textarea id="from" class="w-full h-20 p-2 border rounded-lg text-sm" placeholder="Your Company"></textarea></div><div><label class="block text-sm text-gray-600 mb-1">Bill To</label><textarea id="to" class="w-full h-20 p-2 border rounded-lg text-sm" placeholder="Client Name"></textarea></div></div>
<div class="grid grid-cols-3 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Invoice #</label><input type="text" id="invNum" value="INV-001" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Date</label><input type="date" id="date" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Due</label><input type="date" id="due" class="w-full p-2 border rounded-lg"></div></div>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Items (desc|qty|price, one per line)</label><textarea id="items" class="w-full h-24 p-2 border rounded-lg text-sm" placeholder="Web Development|10|150">Web Development|10|150</textarea></div>
<div class="flex gap-3"><button onclick="generate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate Invoice</button></div>
<div id="invoice" class="mt-4 p-6 bg-white border rounded-lg hidden"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function generate(){var from=document.getElementById("from").value;var to=document.getElementById("to").value;var invNum=document.getElementById("invNum").value;var date=document.getElementById("date").value;var due=document.getElementById("due").value;var lines=document.getElementById("items").value.split("\n");var total=0;var rows="";lines.forEach(l=>{var parts=l.split("|");if(parts.length===3){var qty=parseFloat(parts[1])||0;var price=parseFloat(parts[2])||0;var lineTotal=qty*price;total+=lineTotal;rows+="<tr><td>"+parts[0]+"</td><td class='text-center'>"+qty+"</td><td class='text-right'>$"+price.toFixed(2)+"</td><td class='text-right'>$"+lineTotal.toFixed(2)+"</td></tr>";}});var html="<h2 class='text-2xl font-bold'>INVOICE</h2><div class='grid grid-cols-2 gap-4 mt-4'><div><b>From:</b><pre class='whitespace-pre-wrap'>"+from+"</pre></div><div class='text-right'><b>Invoice #:</b> "+invNum+"<br><b>Date:</b> "+date+"<br><b>Due:</b> "+due+"</div></div><div><b>Bill To:</b><pre class='whitespace-pre-wrap'>"+to+"</pre></div><table class='w-full mt-4'><thead><tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>"+rows+"</tbody><tfoot><tr><td colspan='3' class='text-right font-bold'>Total:</td><td>$"+total.toFixed(2)+"</td></tr></tfoot></table>";document.getElementById("invoice").innerHTML=html;document.getElementById("invoice").classList.remove("hidden");}document.getElementById("date").valueAsDate=new Date();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
