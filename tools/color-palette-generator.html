<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Color Palette Generator</h1><p class="text-gray-500 mb-4">Generate beautiful color palettes</p>

<div class="flex gap-3 items-end"><div><label class="text-xs font-medium text-gray-600">Base Color</label><input type="color" id="base" value="#3B82F6" class="h-10 w-20 border rounded cursor-pointer"></div><button onclick="genComp()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">Complementary</button><button onclick="genAna()" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Analogous</button><button onclick="genTriad()" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Triadic</button><button onclick="genShades()" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Shades</button></div>

<script>function hexToHSL(h){var r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255;var max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2,h2,s;if(max===min){h2=s=0}else{var d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h2=((g-b)/d+(g<b?6:0))/6;break;case g:h2=((b-r)/d+2)/6;break;case b:h2=((r-g)/d+4)/6;break}}return[h2*360,s*100,l*100]}function hslToHex(h,s,l){s/=100;l/=100;var a=s*Math.min(l,1-l);var f=function(n){var k=(n+h/30)%12;var c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,"0")};return"#"+f(0)+f(8)+f(4)}function show(colors){document.getElementById("palette").innerHTML=colors.map(function(c){return'<div class="flex-1"><div class="h-24 rounded-lg" style="background:'+c+'"></div><div class="text-center text-xs font-mono mt-1 text-gray-600">'+c.toUpperCase()+'</div></div>'}).join("")}function genComp(){var h=hexToHSL(document.getElementById("base").value);show([document.getElementById("base").value,hslToHex((h[0]+180)%360,h[1],h[2])])}function genAna(){var h=hexToHSL(document.getElementById("base").value);show([hslToHex((h[0]-30+360)%360,h[1],h[2]),document.getElementById("base").value,hslToHex((h[0]+30)%360,h[1],h[2])])}function genTriad(){var h=hexToHSL(document.getElementById("base").value);show([document.getElementById("base").value,hslToHex((h[0]+120)%360,h[1],h[2]),hslToHex((h[0]+240)%360,h[1],h[2])])}function genShades(){var h=hexToHSL(document.getElementById("base").value);var c=[];for(var i=0;i<7;i++)c.push(hslToHex(h[0],h[1],Math.max(5,Math.min(95,90-i*15))));show(c)}genShades()</script>
