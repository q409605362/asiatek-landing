<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Stopwatch - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online precision stopwatch with lap times tool. Fast, secure, no installation.">
<meta name="keywords" content="online, stopwatch, online tool, free online stopwatch">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.stopwatch">Online Stopwatch</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.stopwatch">Precision stopwatch with lap times</p>
<div class="text-center space-y-6">
<div class="text-6xl font-mono font-bold text-gray-800" id="display">00:00:00.000</div>
<div class="flex justify-center gap-3">
<button onclick="toggle()" id="btn" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-lg">Start</button>
<button onclick="lap()" class="px-6 py-3 bg-gray-200 rounded-lg hover:bg-gray-300 text-lg">Lap</button>
<button onclick="reset()" class="px-6 py-3 bg-gray-200 rounded-lg hover:bg-gray-300 text-lg">Reset</button>
</div>
<div id="laps" class="max-h-60 overflow-y-auto"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var timer=null,start_time=0,elapsed=0,running=false,lapCount=0,lastLap=0;function fmt(ms){var h=Math.floor(ms/3600000);var m=Math.floor(ms%3600000/60000);var s=Math.floor(ms%60000/1000);var ml=ms%1000;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(ml).padStart(3,"0")}function update(){elapsed=Date.now()-start_time;document.getElementById("display").textContent=fmt(elapsed)}function toggle(){if(running){running=false;clearInterval(timer)}else{running=true;start_time=Date.now()-elapsed;timer=setInterval(update,10)}}function lap(){if(!running)return;lapCount++;var diff=elapsed-lastLap;lastLap=elapsed;document.getElementById("laps").innerHTML='<div class="flex justify-between py-2 border-b text-sm font-medium text-gray-500"><span>Lap '+lapCount+'</span><span>'+fmt(diff)+'</span></div>'+document.getElementById("laps").innerHTML}function reset(){running=false;clearInterval(timer);elapsed=0;lapCount=0;lastLap=0;document.getElementById("display").textContent="00:00:00.000";document.getElementById("laps").innerHTML=""}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
