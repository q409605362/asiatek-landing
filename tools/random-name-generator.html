<script>var fn=["James","Mary","John","Patricia","Robert","Jennifer","Michael","Linda","William","Elizabeth"];var ln=["Smith","Johnson","Williams","Brown","Jones","Davis","Miller","Wilson","Moore","Taylor"];function generate(){var n=parseInt(document.getElementById("count").value)||1;var html="";for(var i=0;i<n;i++)html+='<div class="p-2 bg-white border rounded">'+(fn[Math.floor(Math.random()*fn.length)]+" "+ln[Math.floor(Math.random()*ln.length)])+'</div>';document.getElementById("names").innerHTML=html;}</script>
