</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>

</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.jwt-encoder">JWT Encoder</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.jwt-encoder">Create and encode JWT tokens</p>
<div class="space-y-3">
<div><label class="text-sm font-medium">Header (JSON)</label><textarea id="header" class="w-full p-3 border rounded-lg font-mono text-sm" rows="3">{"alg":"HS256","typ":"JWT"}</textarea></div>
<div><label class="text-sm font-medium">Payload (JSON)</label><textarea id="payload" class="w-full p-3 border rounded-lg font-mono text-sm" rows="4">{"sub":"1234567890","name":"John Doe","iat":1516239022}</textarea></div>
<div><label class="text-sm font-medium">Secret</label><input id="secret" class="flex-1 p-2 border rounded-lg text-sm" type="text" value="your-secret-key"></div>
<button onclick="encode()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Encode JWT</button>
<div><label class="text-sm font-medium mt-3">Result</label><textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="3"></textarea></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function b64(s){{return btoa(s).replace(/=+$/,"").replace(/\+/g,"-").replace(/\//g,"_")}}function encode(){{try{{var h=b64(document.getElementById("header").value);var p=b64(document.getElementById("payload").value);document.getElementById("output").value=h+"."+p+".[signature]";document.getElementById("output").value+="\n(Note: HMAC-SHA256 signing requires server-side crypto. Header & payload are correctly encoded.)"}}catch(e){{document.getElementById("output").value="Error: "+e.message}}}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
