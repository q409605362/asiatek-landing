<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON \u2194 YAML - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online json \u2194 yaml tool. Fast, secure, no installation.">
<meta name="keywords" content="json \u2194 yaml, online tool, free json \u2194 yaml">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.json-yaml-converter">JSON \u2194 YAML Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.json-yaml-converter">Convert between JSON and YAML.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Paste JSON or YAML..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="j2y()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">JSON \u2192 YAML</button><button onclick="y2j()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">YAML \u2192 JSON</button></div>
<textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function j2y(){try{var o=JSON.parse(document.getElementById("input").value);var r="";for(var k in o)r+=k+": "+(typeof o[k]==="object"?JSON.stringify(o[k]):o[k])+"\n";document.getElementById("output").value=r;}catch(e){document.getElementById("output").value="Error: "+e.message;}}function y2j(){try{var t=document.getElementById("input").value;var o={};t.split("\n").forEach(function(l){var m=l.match(/^(\w+):\s*(.+)$/);if(m)o[m[1]]=isNaN(m[2])?m[2]:Number(m[2]);});document.getElementById("output").value=JSON.stringify(o,null,2);}catch(e){document.getElementById("output").value="Error: "+e.message;}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
