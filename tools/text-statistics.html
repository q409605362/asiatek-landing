<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Statistics - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online count characters, words, sentences, paragraphs tool. Fast, secure, no installation.">
<meta name="keywords" content="text, statistics, online tool, free text statistics">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Text Statistics</h1><p class="text-gray-500 mb-4">Count characters, words, sentences, paragraphs</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder="Paste or type your text here..." oninput="calc()"></textarea>
<div id="stats" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-4"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var t=document.getElementById("input").value;var c=t.length;var cc=t.replace(/\s/g,"").length;var w=t.trim()?t.trim().split(/\s+/).length:0;var s=t.split(/[.!?]+/).filter(function(x){return x.trim()}).length;var p=t.split(/\n\n+/).filter(function(x){return x.trim()}).length;var lines=t.split("\n").length;var read=Math.ceil(w/200);document.getElementById("stats").innerHTML=[["Characters",c],["Characters (no spaces)",cc],["Words",w],["Sentences",s],["Paragraphs",p],["Lines",lines],["Reading Time",read+" min"]].map(function(x){return'<div class="bg-white p-4 rounded-lg border text-center"><div class="text-2xl font-bold text-blue-600">'+x[1]+'</div><div class="text-xs text-gray-500 mt-1">'+x[0]+'</div></div>'}).join("")}</script>
</body>
</html>
