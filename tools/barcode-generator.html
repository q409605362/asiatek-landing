<script>var START_B=[104,206,217],STOP=211;var C128=[212,193,194,195,198,199,200,201,202,160,161,162,165,168,169,170,173,176,177,178,181,185,188,200,203,204,206,207,209,212,216,220,221,222,224,227,232,233,236,237,240,241,243,247,252,253,254,255,256,257,259];function encode(data){var codes=[];var sum=START_B[0];codes.push(START_B[0]);for(var i=0;i<data.length;i++){var c=data.charCodeAt(i)-32;if(c<0||c>103)c=0;codes.push(C128[c]);sum+=c*(i+1);}codes.push(sum%103);codes.push(STOP);return codes;}function generate(){var data=document.getElementById("data").value;if(!data)return;var codes=encode(data);var canvas=document.getElementById("canvas");var w=4;canvas.width=codes.reduce(function(a,c){return a+(c&32?w:w*2)+(c&64?w:w*2);},0);canvas.height=100;var ctx=canvas.getContext("2d");ctx.fillStyle="white";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="black";var x=0;codes.forEach(function(c){var w1=(c&32?1:2)*w;var w2=(c&64?1:2)*w;ctx.fillRect(x,0,w1,100);x+=w1;ctx.fillRect(x,0,w2,100);x+=w2;});}generate();</script>
