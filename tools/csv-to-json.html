<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="keywords" content="csv, to, json, converter, online tool, free csv to json converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">CSV to JSON Converter</h1><p class="text-gray-500 mb-4">Convert CSV data to JSON format</p>
<textarea id="input" class="w-full p-3 border rounded-lg font-mono text-sm" rows="6" placeholder="name,age,city\nJohn,30,NYC\nJane,25,London"></textarea>
<div class="flex gap-3 mt-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert to JSON</button><button onclick="download()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Download JSON</button></div>
<textarea id="output" class="w-full p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly rows="6"></textarea>
<div id="info" class="text-sm text-gray-500 mt-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function convert(){try{var lines=document.getElementById("input").value.trim().split("\n");if(lines.length<2)throw new Error("Need at least a header row and one data row");var headers=lines[0].split(",").map(function(h){return h.trim().replace(/^["']|["']$/g,"")});var data=lines.slice(1).map(function(line){var vals=line.split(",").map(function(v){return v.trim().replace(/^["']|["']$/g,"")});var obj={};headers.forEach(function(h,i){var v=vals[i]||"";if(!isNaN(v)&&v!=="")v=Number(v);obj[h]=v});return obj});document.getElementById("output").value=JSON.stringify(data,null,2);document.getElementById("info").textContent=data.length+" rows converted"}catch(e){document.getElementById("output").value="Error: "+e.message}}function download(){var j=document.getElementById("output").value;if(!j)return;var blob=new Blob([j],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="data.json";a.click()}</script>
</body>
</html>
