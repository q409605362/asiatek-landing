<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Preview & Editor - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Preview and validate SVG code.">
<meta name="keywords" content="svg preview editor">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">SVG Preview & Editor</h1>
<p class="text-gray-500 mb-4">Preview and validate SVG code.</p>
<textarea id="input" class="w-full h-48 p-3 border rounded-lg font-mono text-sm"><svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="80" fill="#3b82f6"/><text x="100" y="110" text-anchor="middle" fill="white" font-size="20">Hello</text></svg></textarea><div class="flex gap-3 mt-3"><button onclick="preview()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Preview</button><button onclick="download()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Download</button></div><div class="mt-4 p-4 bg-white border rounded-lg text-center"><div id="preview-container"></div></div><div id="info" class="mt-3 text-sm"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function preview(){try{var svg=document.getElementById("input").value;document.getElementById("preview-container").innerHTML=svg;var parser=new DOMParser(),doc=parser.parseFromString(svg,"image/svg+xml");var err=doc.querySelector("parsererror");if(err){document.getElementById("info").textContent="Invalid SVG";document.getElementById("info").className="mt-3 text-sm text-red-600";}else{document.getElementById("info").textContent="Valid SVG";document.getElementById("info").className="mt-3 text-sm text-green-600";}}catch(e){document.getElementById("info").textContent="Error";document.getElementById("info").className="mt-3 text-sm text-red-600";}}function download(){var blob=new Blob([document.getElementById("input").value],{type:"image/svg+xml"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="image.svg";a.click();}preview();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
