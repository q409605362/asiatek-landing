<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online calculate monthly loan payments tool. Fast, secure, no installation.">
<meta name="keywords" content="loan, calculator, online tool, free loan calculator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Loan Calculator</h1><p class="text-gray-500 mb-4">Calculate monthly loan payments</p>
<div class="space-y-3">
<div><label class="text-sm font-medium">Loan Amount ($)</label><input id="amount" type="number" class="w-full p-2 border rounded-lg text-sm" value="250000" oninput="calc()"></div>
<div><label class="text-sm font-medium">Annual Interest Rate (%)</label><input id="rate" type="number" class="w-full p-2 border rounded-lg text-sm" value="6.5" step="0.1" oninput="calc()"></div>
<div><label class="text-sm font-medium">Loan Term (years)</label><input id="years" type="number" class="w-full p-2 border rounded-lg text-sm" value="30" oninput="calc()"></div>
<div id="result" class="bg-blue-50 p-4 rounded-lg grid grid-cols-2 gap-4 text-center"></div>
<div id="schedule" class="mt-4"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var p=parseFloat(document.getElementById("amount").value)||0;var r=parseFloat(document.getElementById("rate").value)/100/12;var n=parseInt(document.getElementById("years").value)*12;if(r===0){var m=p/n;document.getElementById("result").innerHTML='<div><div class="text-2xl font-bold text-blue-700">$'+m.toFixed(2)+'</div><div class="text-xs text-gray-500">Monthly Payment</div></div><div><div class="text-2xl font-bold text-gray-700">$'+p.toFixed(0)+'</div><div class="text-xs text-gray-500">Total Paid</div></div>';return}var m=p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);var total=m*n;var interest=total-p;document.getElementById("result").innerHTML='<div><div class="text-2xl font-bold text-blue-700">$'+m.toFixed(2)+'</div><div class="text-xs text-gray-500">Monthly Payment</div></div><div><div class="text-2xl font-bold text-red-600">$'+interest.toFixed(0)+'</div><div class="text-xs text-gray-500">Total Interest</div></div><div><div class="text-2xl font-bold text-gray-700">$'+total.toFixed(0)+'</div><div class="text-xs text-gray-500">Total Paid</div></div><div><div class="text-2xl font-bold text-green-600">'+Math.round(interest/total*100)+'%</div><div class="text-xs text-gray-500">Interest Ratio</div></div>'}calc()</script>
</body>
</html>
