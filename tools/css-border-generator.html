<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Border Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Generate CSS border styles.">
<meta name="keywords" content="css border style">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">CSS Border Generator</h1>
<p class="text-gray-500 mb-4">Generate CSS border styles.</p>
<div class="grid grid-cols-4 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Width</label><input type="number" id="width" value="2" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Style</label><select id="style" class="w-full p-2 border rounded-lg"><option>solid</option><option>dashed</option><option>dotted</option><option>double</option></select></div><div><label class="block text-sm text-gray-600 mb-1">Color</label><input type="color" id="color" value="#333333" class="w-full h-10 cursor-pointer"></div><div><label class="block text-sm text-gray-600 mb-1">Radius</label><input type="number" id="radius" value="4" class="w-full p-2 border rounded-lg"></div></div><div class="text-center p-12 bg-gray-100 rounded-lg mb-4"><div id="preview" style="width:150px;height:100px;background:#fff;border:2px solid #333333;border-radius:4px;margin:0 auto;display:flex;align-items:center;justify-content:center;">Preview</div></div><div class="flex gap-3"><button onclick="copy()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Copy CSS</button></div><pre id="css" class="mt-4 p-4 bg-gray-800 text-green-400 rounded-lg text-sm"></pre>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function update(){var w=document.getElementById("width").value;var s=document.getElementById("style").value;var c=document.getElementById("color").value;var r=document.getElementById("radius").value;var b=w+"px "+s+" "+c;var p=document.getElementById("preview");p.style.border=b;p.style.borderRadius=r+"px";document.getElementById("css").textContent=".element {\n  border: "+b+";\n  border-radius: "+r+"px;\n}";}function copy(){navigator.clipboard.writeText(document.getElementById("css").textContent);}update();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
