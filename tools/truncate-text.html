<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Truncate Tool - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Truncate text by characters or words.">
<meta name="keywords" content="truncate text">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Text Truncate Tool</h1>
<p class="text-gray-500 mb-4">Truncate text by characters or words.</p>
<textarea id="input" class="w-full h-32 p-3 border rounded-lg font-mono text-sm" placeholder="Enter text..."></textarea><div class="grid grid-cols-3 gap-4 mt-3"><div><label class="block text-sm text-gray-600 mb-1">Mode</label><select id="mode" class="w-full p-2 border rounded-lg"><option value="chars">Characters</option><option value="words">Words</option></select></div><div><label class="block text-sm text-gray-600 mb-1">Limit</label><input type="number" id="limit" value="100" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">Ellipsis</label><input type="text" id="ellipsis" value="..." class="w-full p-2 border rounded-lg"></div></div><div class="flex gap-3 mt-3"><button onclick="proc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Truncate</button></div><textarea id="output" class="w-full h-32 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function proc(){var t=document.getElementById("input").value;var m=document.getElementById("mode").value;var l=parseInt(document.getElementById("limit").value)||100;var e=document.getElementById("ellipsis").value;document.getElementById("output").value=m==="chars"?t.length>l?t.substr(0,l)+e:t:t.split(/\s+/).length>l?t.split(/\s+/).slice(0,l).join(" ")+e:t;}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
