<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online convert between area units tool. Fast, secure, no installation.">
<meta name="keywords" content="area, converter, online tool, free area converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.area-converter">Area Converter</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.area-converter">Convert between area units</p>
<div class="space-y-3">
<div class="flex items-center gap-3"><input id="val" type="number" class="flex-1 p-2 border rounded-lg text-sm" value="1" oninput="convert()"><select id="unit" class="p-2 border rounded-lg text-sm" onchange="convert()"><option value="1">Sq Meters</option><option value="0.0001">Hectares</option><option value="10.7639">Sq Feet</option><option value="0.000247105">Acres</option><option value="0.000001">Sq Kilometers</option><option value="1.19599">Sq Yards</option></select></div>
<div id="results" class="grid grid-cols-2 gap-2"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var units=["Sq Meters","Hectares","Sq Feet","Acres","Sq Kilometers","Sq Yards"];var factors=[1,0.0001,10.7639,0.000247105,0.000001,1.19599];function convert(){var v=parseFloat(document.getElementById("val").value)||0;var f=parseFloat(document.getElementById("unit").value);var sqm=v/f;document.getElementById("results").innerHTML=units.map(function(n,i){return'<div class="bg-white p-3 rounded-lg border"><div class="text-xs text-gray-500">'+n+'</div><div class="font-mono text-sm font-medium mt-1">'+(sqm*factors[i]).toLocaleString(undefined,{maximumFractionDigits:6})+'</div></div>'}).join("")}convert()</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
