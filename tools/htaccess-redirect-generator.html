<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.htaccess Redirect Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Generate .htaccess redirect rules.">
<meta name="keywords" content="htaccess redirect apache">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">.htaccess Redirect Generator</h1>
<p class="text-gray-500 mb-4">Generate .htaccess redirect rules.</p>
<div class="mb-4"><label class="block text-sm text-gray-600 mb-1">Redirect Type</label><select id="type" class="w-full p-2 border rounded-lg"><option value="301">301 Permanent</option><option value="302">302 Temporary</option></select></div>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">From URL</label><input type="text" id="from" placeholder="/old-page" class="w-full p-2 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">To URL</label><input type="text" id="to" placeholder="https://example.com/new-page" class="w-full p-2 border rounded-lg"></div></div>
<div class="flex gap-3"><button onclick="generate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate</button></div>
<textarea id="output" class="w-full h-24 p-3 border rounded-lg bg-gray-800 text-green-400 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function generate(){var type=document.getElementById("type").value;var from=document.getElementById("from").value;var to=document.getElementById("to").value;document.getElementById("output").value="RewriteEngine On\nRewriteRule ^"+from.replace(/^\//,"")+"$ "+to+" [R="+type+",L]";}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
