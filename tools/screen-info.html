<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen & Browser Info - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online detect your screen and browser information tool. Fast, secure, no installation.">
<meta name="keywords" content="screen, &, browser, info, online tool, free screen & browser info">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.screen-info">Screen & Browser Info</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.screen-info">Detect your screen and browser information</p>
<div id="info" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var d=document.getElementById("info");var items=[["Screen Resolution",screen.width+" × "+screen.height],["Available Screen",screen.availWidth+" × "+screen.availHeight],["Window Inner",window.innerWidth+" × "+window.innerHeight],["Window Outer",window.outerWidth+" × "+window.outerHeight],["Color Depth",screen.colorDepth+" bit"],["Pixel Ratio",window.devicePixelRatio],["Orientation",screen.orientation?screen.orientation.type:"N/A"],["User Agent",navigator.userAgent],["Platform",navigator.platform],["Language",navigator.language],["Cookies Enabled",navigator.cookieEnabled],["Online",navigator.onLine?"Yes":"No"],["Touch Points",navigator.maxTouchPoints],["CPU Cores",navigator.hardwareConcurrency||"N/A"],["Memory (GB)",navigator.deviceMemory||"N/A"],["Connection",navigator.connection?navigator.connection.effectiveType:"N/A"]];d.innerHTML=items.map(function(x){return'<div class="bg-white p-3 rounded-lg border"><div class="text-xs text-gray-500">'+x[0]+'</div><div class="font-medium text-sm mt-1 break-all">'+x[1]+'</div></div>'}).join("")</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
