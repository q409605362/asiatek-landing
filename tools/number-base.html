<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Base Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online number base converter tool. Fast, secure, no installation.">
<meta name="keywords" content="number base converter, online tool, free number base converter">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Number Base Converter</h1><p class="text-gray-500 mb-4">Convert between Binary, Decimal, Hex, Octal.</p>
<div class="grid grid-cols-2 gap-4"><div><label class="text-sm text-gray-600">Decimal:</label><input id="dec" class="w-full p-2 border rounded-lg font-mono mt-1" oninput="cv('dec')"></div><div><label class="text-sm text-gray-600">Binary:</label><input id="bin" class="w-full p-2 border rounded-lg font-mono mt-1" oninput="cv('bin')"></div><div><label class="text-sm text-gray-600">Hex:</label><input id="hex" class="w-full p-2 border rounded-lg font-mono mt-1" oninput="cv('hex')"></div><div><label class="text-sm text-gray-600">Octal:</label><input id="oct" class="w-full p-2 border rounded-lg font-mono mt-1" oninput="cv('oct')"></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function cv(f){try{var n;if(f==="dec")n=parseInt(document.getElementById("dec").value,10);else if(f==="bin")n=parseInt(document.getElementById("bin").value,2);else if(f==="hex")n=parseInt(document.getElementById("hex").value,16);else n=parseInt(document.getElementById("oct").value,8);if(isNaN(n))return;if(f!=="dec")document.getElementById("dec").value=n;if(f!=="bin")document.getElementById("bin").value=n.toString(2);if(f!=="hex")document.getElementById("hex").value=n.toString(16).toUpperCase();if(f!=="oct")document.getElementById("oct").value=n.toString(8);}catch(e){}}</script>
</body>
</html>
