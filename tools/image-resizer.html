<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Resize images online. Supports PNG, JPEG, WebP with drag & drop and preset sizes">
<meta name="keywords" content="image resizer, resize image online, image compressor, reduce image size, resize png jpg">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Image Resizer</h1><p class="text-gray-500 mb-4">Resize images online. Supports PNG, JPEG, WebP with drag & drop and preset sizes</p>
<div class="space-y-4">
<div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center" id="drop-zone">
<p class="text-gray-500 mb-2">📷 Drop an image here or click to upload</p>
<input type="file" accept="image/*" id="fileInput" onchange="loadImage(this)" class="hidden">
<button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">Choose Image</button>
</div>
<div id="controls" class="hidden space-y-3">
<div class="flex items-center gap-4 flex-wrap">
<div><label class="text-xs font-medium">Width (px)</label><input id="width" type="number" class="w-24 p-2 border rounded-lg text-sm" oninput="lockAspect('w')"></div>
<div class="mt-4"><button onclick="toggleLock()" id="lockBtn" class="text-gray-600 hover:text-blue-600 text-lg">🔒</button></div>
<div><label class="text-xs font-medium">Height (px)</label><input id="height" type="number" class="w-24 p-2 border rounded-lg text-sm" oninput="lockAspect('h')"></div>
<div><label class="text-xs font-medium">Format</label><select id="format" class="p-2 border rounded-lg text-sm"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option><option value="image/webp">WebP</option></select></div>
<div><label class="text-xs font-medium">Quality (JPEG/WebP)</label><input id="quality" type="range" min="10" max="100" value="90" class="w-24"><span id="qval" class="text-xs">90%</span></div>
</div>
<div class="flex gap-2"><button onclick="resize()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">Resize & Download</button><button onclick="resetSize()" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm">Reset Size</button></div>
<div class="flex gap-2 text-xs text-gray-500" id="info"></div>
<div class="flex gap-2">
<button onclick="preset(1920,1080)" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">1920×1080</button>
<button onclick="preset(1280,720)" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">1280×720</button>
<button onclick="preset(800,600)" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">800×600</button>
<button onclick="preset(400,400)" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">400×400</button>
<button onclick="preset(150,150)" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">150×150</button>
<button onclick="halfSize()" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-xs">50%</button>
</div>
</div>
<canvas id="canvas" class="hidden"></canvas>
<img id="origImg" class="hidden">
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var origW,origH,locked=true;
function loadImage(input){if(!input.files||!input.files[0])return;var reader=new FileReader();reader.onload=function(e){var img=document.getElementById("origImg");img.onload=function(){origW=img.naturalWidth;origH=img.naturalHeight;document.getElementById("width").value=origW;document.getElementById("height").value=origH;document.getElementById("controls").classList.remove("hidden");document.getElementById("info").innerHTML="Original: "+origW+"×"+origH+" · "+(input.files[0].size/1024).toFixed(1)+" KB"};img.src=e.target.result};reader.readAsDataURL(input.files[0])}
function lockAspect(dim){if(!locked)return;var w=parseInt(document.getElementById("width").value),h=parseInt(document.getElementById("height").value);var ratio=origW/origH;if(dim==="w")document.getElementById("height").value=Math.round(w/ratio);else document.getElementById("width").value=Math.round(h*ratio)}
function toggleLock(){locked=!locked;document.getElementById("lockBtn").textContent=locked?"🔒":"🔓"}
function resetSize(){document.getElementById("width").value=origW;document.getElementById("height").value=origH}
function preset(w,h){document.getElementById("width").value=w;document.getElementById("height").value=h}
function halfSize(){document.getElementById("width").value=Math.round(origW/2);document.getElementById("height").value=Math.round(origH/2)}
document.getElementById("quality").oninput=function(){document.getElementById("qval").textContent=this.value+"%"};
function resize(){var w=parseInt(document.getElementById("width").value),h=parseInt(document.getElementById("height").value);var format=document.getElementById("format").value;var quality=parseInt(document.getElementById("quality").value)/100;
var canvas=document.getElementById("canvas");canvas.width=w;canvas.height=h;var ctx=canvas.getContext("2d");ctx.drawImage(document.getElementById("origImg"),0,0,w,h);
var link=document.createElement("a");link.download="resized_"+w+"x"+h+"."+(format.split("/")[1]);link.href=canvas.toDataURL(format,quality);link.click();
var est=canvas.toDataURL(format,quality).length*0.75;document.getElementById("info").innerHTML+=" · Output: "+w+"×"+h+" · ~"+(est/1024).toFixed(1)+" KB"}
var dz=document.getElementById("drop-zone");dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("border-blue-400")});dz.addEventListener("dragleave",()=>dz.classList.remove("border-blue-400"));dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("border-blue-400");if(e.dataTransfer.files[0]){document.getElementById("fileInput").files=e.dataTransfer.files;loadImage(document.getElementById("fileInput"))}})</script>
</body>
</html>
