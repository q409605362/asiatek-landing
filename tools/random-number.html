<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online random number generator tool. Fast, secure, no installation.">
<meta name="keywords" content="random number generator, online tool, free random number generator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900" data-i18n="nav.home">Home</a>
<a href="/tools" class="text-blue-600 font-medium" data-i18n="nav.tools">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2" data-i18n="tool.title.random-number">Random Number Generator</h1><p class="text-gray-500 mb-4" data-i18n="tool.desc.random-number">Generate random numbers.</p>
<div class="flex gap-3 items-end"><div><label class="text-sm text-gray-600">Min:</label><input id="min" type="number" value="1" class="w-20 p-2 border rounded-lg ml-2"></div><div><label class="text-sm text-gray-600">Max:</label><input id="max" type="number" value="100" class="w-20 p-2 border rounded-lg ml-2"></div><div><label class="text-sm text-gray-600">Count:</label><input id="cnt" type="number" value="10" class="w-20 p-2 border rounded-lg ml-2"></div><button onclick="gen()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate</button></div>
<div id="out" class="mt-4 flex flex-wrap gap-2"></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span data-i18n="footer.text">© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function gen(){var mn=parseInt(document.getElementById("min").value);var mx=parseInt(document.getElementById("max").value);var n=parseInt(document.getElementById("cnt").value);var h="";for(var i=0;i<n;i++){var r=Math.floor(Math.random()*(mx-mn+1))+mn;h+='<div class="bg-blue-50 text-blue-800 px-4 py-2 rounded-lg font-mono font-bold">'+r+"</div>";}document.getElementById("out").innerHTML=h;}gen();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
<script>
window.changeLanguage = function(lang) {
  if (typeof i18nUtils !== 'undefined') {
    i18nUtils.setLang(lang);
    // Update selector
    document.querySelectorAll('#lang-selector').forEach(function(s) { s.value = lang; });
  }
};
</script>
</body>
</html>
