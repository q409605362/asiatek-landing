<div class="space-y-3">
<label class="flex items-center gap-2"><input type="checkbox" id="redirect" checked> Force HTTPS</label>
<label class="flex items-center gap-2"><input type="checkbox" id="www"> Force WWW</label>

<script>function gen(){var h="# .htaccess generated by Asiatek AI DevTools\n\n";if(document.getElementById("redirect").checked)h+="# Force HTTPS\nRewriteEngine On\nRewriteCond %{HTTPS} off\nRewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]\n\n";if(document.getElementById("www").checked)h+="# Force WWW\nRewriteEngine On\nRewriteCond %{HTTP_HOST} !^www\\. [NC]\nRewriteRule ^(.*)$ https://www.%{HTTP_HOST}/$1 [L,R=301]\n\n";if(document.getElementById("cache").checked)h+="# Browser Caching\n<IfModule mod_expires.c>\n  ExpiresActive On\n  ExpiresByType image/jpg "access plus 1 year"\n  ExpiresByType image/jpeg "access plus 1 year"\n  ExpiresByType image/gif "access plus 1 year"\n  ExpiresByType image/png "access plus 1 year"\n  ExpiresByType text/css "access plus 1 month"\n  ExpiresByType application/pdf "access plus 1 month"\n  ExpiresByType application/javascript "access plus 1 month"\n  ExpiresByType text/html "access plus 1 hour"\n</IfModule>\n\n";if(document.getElementById("gzip").checked)h+="# GZIP Compression\n<IfModule mod_deflate.c>\n  AddOutputFilterByType DEFLATE text/html\n  AddOutputFilterByType DEFLATE text/css\n  AddOutputFilterByType DEFLATE application/javascript\n  AddOutputFilterByType DEFLATE application/json\n  AddOutputFilterByType DEFLATE image/svg+xml\n</IfModule>\n\n";if(document.getElementById("error").checked)h+="# Custom Error Pages\nErrorDocument 404 /404.html\nErrorDocument 403 /403.html\nErrorDocument 500 /500.html\n\n";if(document.getElementById("cors").checked)h+="# Enable CORS\n<IfModule mod_headers.c>\n  Header set Access-Control-Allow-Origin "*"\n</IfModule>\n\n";if(document.getElementById("deny").checked)h+="# Block Directory Listing\nOptions -Indexes\n";document.getElementById("output").value=h}</script>
