<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Numeral Converter - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Convert between Roman numerals and numbers.">
<meta name="keywords" content="roman numeral roman numbers">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Roman Numeral Converter</h1>
<p class="text-gray-500 mb-4">Convert between Roman numerals and numbers.</p>
<div class="flex gap-2 mb-3"><button id="toR" onclick="sm('r')" class="px-4 py-2 rounded-lg text-sm bg-blue-600 text-white">To Roman</button><button id="toN" onclick="sm('n')" class="px-4 py-2 rounded-lg text-sm bg-gray-200">To Number</button></div>
<textarea id="input" class="w-full h-20 p-3 border rounded-lg font-mono text-sm" placeholder="Enter number or Roman numeral..."></textarea>
<div class="flex gap-3 mt-3"><button onclick="convert()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Convert</button></div>
<div class="mt-4 p-6 bg-blue-50 rounded-lg text-center"><div class="text-4xl font-bold" id="result">-</div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>var m="r";function sm(x){m=x;document.getElementById("toR").className=x==="r"?"px-4 py-2 rounded-lg text-sm bg-blue-600 text-white":"px-4 py-2 rounded-lg text-sm bg-gray-200";document.getElementById("toN").className=x==="n"?"px-4 py-2 rounded-lg text-sm bg-blue-600 text-white":"px-4 py-2 rounded-lg text-sm bg-gray-200";}function toRoman(n){var vals=[1000,900,500,400,100,90,50,40,10,9,5,4,1];var syms=["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];var r="";for(var i=0;i<vals.length;i++){while(n>=vals[i]){r+=syms[i];n-=vals[i];}}return r;}function fromRoman(s){var vals={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};var r=0;for(var i=0;i<s.length;i++){if(i>0&&vals[s[i]]>vals[s[i-1]])r+=vals[s[i]]-2*vals[s[i-1]];else r+=vals[s[i]];}return r;}function convert(){var v=document.getElementById("input").value.trim();if(m==="r"){var n=parseInt(v);if(isNaN(n)||n<1||n>3999){document.getElementById("result").textContent="Invalid";return;}document.getElementById("result").textContent=toRoman(n);}else{document.getElementById("result").textContent=fromRoman(v.toUpperCase());}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
