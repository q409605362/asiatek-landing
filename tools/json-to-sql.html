<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">

<meta name="keywords" content="json to sql">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">JSON to SQL Converter</h1>
<p class="text-gray-500 mb-4">Convert JSON to SQL INSERT statements.</p>
<div class="mb-3"><label class="block text-sm text-gray-600 mb-1">Table Name</label><input type="text" id="table" value="my_table" class="w-full p-2 border rounded-lg"></div><textarea id="input" class="w-full h-48 p-3 border rounded-lg font-mono text-sm">[{"name":"John","age":30}]</textarea><div class="flex gap-3 mt-3"><button onclick="proc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Generate SQL</button></div><textarea id="output" class="w-full h-48 p-3 border rounded-lg bg-gray-50 font-mono text-sm mt-3" readonly></textarea>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function proc(){try{var tbl=document.getElementById("table").value||"table";var data=JSON.parse(document.getElementById("input").value);if(!Array.isArray(data))data=[data];var keys=Object.keys(data[0]);var create="CREATE TABLE "+tbl+" (\n  "+keys.map(k=>k+" TEXT").join(",\n  ")+"\n);\n\n";var inserts=data.map(r=>"INSERT INTO "+tbl+" ("+keys.join(", ")+") VALUES ("+keys.map(k=>"'"+(r[k]===null?"NULL":String(r[k]).replace(/'/g,"''"))+"'").join(", ")+");").join("\n");document.getElementById("output").value=create+inserts;}catch(e){document.getElementById("output").value="Error";}}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
