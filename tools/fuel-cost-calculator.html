<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Cost Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Free online calculate trip fuel costs tool. Fast, secure, no installation.">
<meta name="keywords" content="fuel, cost, calculator, online tool, free fuel cost calculator">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Fuel Cost Calculator</h1><p class="text-gray-500 mb-4">Calculate trip fuel costs</p>
<div class="space-y-3">
<div><label class="text-sm font-medium">Distance</label><div class="flex gap-2"><input id="dist" type="number" class="flex-1 p-2 border rounded-lg text-sm" value="500"><select id="distUnit" class="p-2 border rounded-lg text-sm"><option value="1">km</option><option value="1.60934">miles</option></select></div></div>
<div><label class="text-sm font-medium">Fuel Efficiency</label><div class="flex gap-2"><input id="eff" type="number" class="flex-1 p-2 border rounded-lg text-sm" value="8"><select id="effUnit" class="p-2 border rounded-lg text-sm"><option value="1">L/100km</option><option value="235.215">MPG (US)</option></select></div></div>
<div><label class="text-sm font-medium">Fuel Price</label><div class="flex gap-2"><input id="price" type="number" class="flex-1 p-2 border rounded-lg text-sm" value="1.50" step="0.01"><select id="priceUnit" class="p-2 border rounded-lg text-sm"><option value="1">$/L</option><option value="3.78541">$/Gallon</option></select></div></div>
<button onclick="calc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Calculate</button>
<div id="result" class="bg-green-50 p-4 rounded-lg grid grid-cols-2 gap-4 text-center"></div>
</div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
© 2026 Asiatek AI · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var dist=parseFloat(document.getElementById("dist").value)*parseFloat(document.getElementById("distUnit").value);var eff=parseFloat(document.getElementById("eff").value);var eu=document.getElementById("effUnit").value;var liters=eu==="1"?dist*eff/100:dist/parseFloat(eu);var pricePerL=parseFloat(document.getElementById("price").value)/parseFloat(document.getElementById("priceUnit").value);var cost=liters*pricePerL;var costPerKm=cost/dist;document.getElementById("result").innerHTML='<div><div class="text-2xl font-bold text-green-700">$'+cost.toFixed(2)+'</div><div class="text-xs text-gray-500">Total Cost</div></div><div><div class="text-2xl font-bold text-blue-700">'+liters.toFixed(1)+' L</div><div class="text-xs text-gray-500">Fuel Needed</div></div><div><div class="text-2xl font-bold text-gray-700">$'+costPerKm.toFixed(3)+'</div><div class="text-xs text-gray-500">Cost per km</div></div><div><div class="text-2xl font-bold text-purple-600">'+(dist/1.60934).toFixed(0)+' mi</div><div class="text-xs text-gray-500">Distance in miles</div></div>'}calc()</script>
</body>
</html>
