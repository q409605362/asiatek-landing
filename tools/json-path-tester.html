</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">

</div>

<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">JSONPath Tester</h1>
<p class="text-gray-500 mb-4">Test JSONPath expressions.</p>
<textarea id="json-input" class="w-full h-48 p-3 border rounded-lg font-mono text-sm" placeholder="Paste JSON...">{"store":{"books":[{"title":"JS"}]}}</textarea><div class="mt-3"><label class="block text-sm text-gray-600 mb-1">JSONPath</label><input type="text" id="path" value="$.store.books[*].title" class="w-full p-2 border rounded-lg font-mono"></div><div class="flex gap-3 mt-3"><button onclick="test()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Test</button></div><div class="mt-3"><h3 class="font-bold mb-2">Result</h3><div id="result" class="p-4 bg-gray-50 border rounded-lg font-mono text-sm whitespace-pre-wrap"></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function gv(obj,path){var parts=path.replace(/^\.\?/,"").split(/\.(?![^\[\]]*\])/);var r=obj;for(var i=0;i<parts.length;i++){var p=parts[i];if(p==="$")continue;if(p==="*"){r=Array.isArray(r)?r.reduce((a,b)=>a.concat(Array.isArray(b)?b:[b]),[]):[r];}else if(p.match(/\[(\d+)\]/)){r=Array.isArray(r)?r[parseInt(p.match(/\[(\d+)\]/)[1])]:r;}else if(r&&typeof r==="object"){r=r[p];}else return undefined;}return r;}function test(){try{var obj=JSON.parse(document.getElementById("json-input").value);var result=gv(obj,document.getElementById("path").value);document.getElementById("result").textContent=JSON.stringify(result,null,2);}catch(e){document.getElementById("result").textContent="Error";}}}</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
