<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage Change Calculator - Free Online Tool | Asiatek AI</title>
<meta name="description" content="Calculate percentage change between two values.">
<meta name="keywords" content="percentage change increase decrease">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-50 to-white min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-14">
<div class="flex items-center">
<a href="/" class="text-xl font-bold text-gray-900">🛠️ DevTools</a>
<span class="ml-3 text-xs text-gray-400">by Asiatek AI</span>
</div>
<div class="flex items-center space-x-4 text-sm">
<a href="/" class="text-gray-500 hover:text-gray-900">Home</a>
<a href="/tools" class="text-blue-600 font-medium">All Tools</a>
</div>
</div>
</div>
</nav>
<main class="max-w-5xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">Percentage Change Calculator</h1>
<p class="text-gray-500 mb-4">Calculate percentage change between two values.</p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block text-sm text-gray-600 mb-1">Original Value</label><input type="number" id="orig" value="100" class="w-full p-3 border rounded-lg"></div><div><label class="block text-sm text-gray-600 mb-1">New Value</label><input type="number" id="new" value="120" class="w-full p-3 border rounded-lg"></div></div>
<div class="flex gap-3"><button onclick="calc()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Calculate</button></div>
<div class="grid grid-cols-2 gap-4 mt-4"><div class="p-6 bg-blue-50 rounded-lg text-center"><div class="text-4xl font-bold" id="change">+20%</div><div class="text-sm text-gray-600">Change</div></div><div class="p-6 bg-green-50 rounded-lg text-center"><div class="text-4xl font-bold" id="diff">+20</div><div class="text-sm text-gray-600">Difference</div></div></div>
</main>
<footer class="bg-gray-50 border-t mt-12">
<div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
<span>© 2026 Asiatek AI</span> · <a href="/tools" class="text-blue-600">Free Developer Tools</a>
</div>
</footer>
<script>function calc(){var o=parseFloat(document.getElementById("orig").value)||0;var n=parseFloat(document.getElementById("new").value)||0;var change=((n-o)/o)*100;var diff=n-o;document.getElementById("change").textContent=(change>=0?"+":"")+change.toFixed(2)+"%";document.getElementById("change").className=(change>=0?"text-4xl font-bold text-green-600":"text-4xl font-bold text-red-600");document.getElementById("diff").textContent=(diff>=0?"+":"")+diff;document.getElementById("diff").className=(diff>=0?"text-4xl font-bold text-green-600":"text-4xl font-bold text-red-600");}calc();</script>
<script src="/tools/lang-detect.js"></script>
<script src="/tools/i18n.js"></script>
</body>
</html>
